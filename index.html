<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ガバショ！ AIコーチングOS（プロトタイプ）</title>
<style>
  /* Standard Theme（白×ピンク・女性アナ/モデル伴走） */
  :root{
    --ink:#222222; --ink-2:#555b66; --mut:#7b8290; --line:#F3DDE5;
    --bg:#ffffff; --bg-soft:#FFFAFC; --card:#ffffff;
    --em:#F5427A; --em-deep:#E1306C; --em-dark:#C71E5B; --em-soft:#FFE6EE; --em-tint:#FFF1F5;
    --gold:#B68A2A; --gold-soft:#F5EBCD; --pink:#FF7A9C; --pink-soft:#FFE6EE; --blue:#4aa3ff; --blue-soft:#e8f3ff;
    --navy:#0D1B4C; --navy-dark:#07112F;
    --purple:#8b6ff0; --purple-soft:#efeafb;
    --warn:#e2603a; --warn-soft:#fdeee8; --bad:#d6334a;
    --radius:18px; --shadow:0 18px 44px -26px rgba(245,66,122,.28);
    --font:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  /* PRO Athlete Theme（ネイビー×ゴールド・管理者/上位プラン） */
  body.theme-pro{
    --ink:#111827; --ink-2:#4b5563; --mut:#6B7280; --line:#E5E7EB;
    --bg-soft:#F7F8FB;
    --em:#B68A2A; --em-deep:#9A7423; --em-dark:#7a5c1c; --em-soft:#F4E8C6; --em-tint:#FAF4E4;
    --shadow:0 18px 44px -26px rgba(13,27,76,.32);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg-soft);line-height:1.7;-webkit-font-smoothing:antialiased}
  /* PRO: ヘッダーをネイビーに */
  body.theme-pro .appbar{background:linear-gradient(120deg,var(--navy),var(--navy-dark))}
  body.theme-pro .appbar .cobrand .horipro,body.theme-pro .appbar .cobrand .ga,body.theme-pro .who b{color:#fff}
  body.theme-pro .appbar .cobrand .star,body.theme-pro .appbar .cobrand .ga{color:var(--gold)}
  body.theme-pro .appbar .cobrand .abhap{color:#fff;border-color:rgba(255,255,255,.4)}
  body.theme-pro .who small{color:var(--gold-soft)}
  body.theme-pro .appbar .cfgbtn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}
  button{font-family:inherit}

  .appbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .appbar-in{display:flex;align-items:center;gap:14px;height:62px;padding:0 20px;max-width:1340px;margin:0 auto}
  .cobrand{display:flex;align-items:center;gap:8px;font-weight:900;text-decoration:none;color:inherit;flex:0 0 auto}
  .cobrand .star{color:var(--em-deep)} .cobrand .horipro{font-size:14px}
  .cobrand .x{color:var(--mut);font-size:11px}
  .cobrand .abhap{font-size:12px;color:var(--ink-2);border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .cobrand .ga{margin-left:2px;font-size:15px;color:var(--em-deep)}
  .roleswitch{margin-left:auto;display:flex;background:var(--em-tint);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;flex-wrap:wrap}
  .roleswitch button{border:0;background:transparent;color:var(--ink-2);font-weight:800;font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .roleswitch button.on{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 8px 18px -10px rgba(5,150,105,.6)}
  .who{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--em),var(--em-deep));color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px}
  .who small{font-size:11px;color:var(--mut);display:block;line-height:1.2}
  .who b{font-size:13px}

  .shell{display:grid;grid-template-columns:232px 1fr;max-width:1340px;margin:0 auto;min-height:calc(100vh - 62px)}
  nav.side{border-right:1px solid var(--line);background:#fff;padding:18px 14px}
  .side .grp{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--mut);margin:14px 10px 6px}
  .side a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;text-decoration:none;color:var(--ink-2);font-weight:700;font-size:13.5px;cursor:pointer}
  .side a .ic{width:20px;height:20px;display:grid;place-items:center;color:var(--mut)}
  .side a:hover{background:var(--em-tint);color:var(--ink)}
  .side a.on{background:var(--em-soft);color:var(--em-dark)}
  .side a.on .ic{color:var(--em)}
  .side .badge{margin-left:auto;background:var(--em);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}
  /* 統一ラインアイコン */
  .ic-svg{width:18px;height:18px;display:inline-block;vertical-align:-3px;flex:0 0 auto}
  .side a .ic .ic-svg{width:19px;height:19px}

  main{padding:26px 30px 70px;min-width:0}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .page-head h1{font-size:24px;font-weight:900;margin:0;letter-spacing:-.01em}
  .page-head p{margin:2px 0 0;color:var(--mut);font-size:13px}

  .btn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:11px;padding:10px 16px;font-weight:800;font-size:13.5px;cursor:pointer;text-decoration:none;transition:transform .12s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn-em{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 12px 24px -12px rgba(5,150,105,.55)}
  .btn-ghost{background:#fff;color:var(--em-dark);border:1.5px solid var(--em)}
  .btn-soft{background:var(--em-soft);color:var(--em-dark)}
  .btn-gold{background:linear-gradient(120deg,#eec96a,var(--gold));color:#5b440c}
  .btn-sm{padding:7px 12px;font-size:12px}
  .btn[disabled]{opacity:.5;cursor:default;transform:none}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px}
  .pill.em{background:var(--em-soft);color:var(--em-dark)} .pill.gold{background:var(--gold-soft);color:#8a6a14}
  .pill.pink{background:var(--pink-soft);color:#b53a63} .pill.blue{background:var(--blue-soft);color:#2a6fb5}
  .pill.warn{background:var(--warn-soft);color:#a8401f} .pill.purple{background:var(--purple-soft);color:#5a45b0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 1px 2px rgba(17,24,39,.03),0 12px 30px -24px rgba(17,24,39,.18)}
  .sec-h{font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--ink-2);display:flex;align-items:center;gap:8px;margin:0 0 14px}
  .sec-h .ic-svg{width:16px;height:16px;color:var(--em)}
  .kpi-ic-lg{width:46px;height:46px;border-radius:12px;background:var(--em-soft);color:var(--em-deep);display:grid;place-items:center;flex:0 0 auto}
  .kpi-ic-lg .ic-svg{width:24px;height:24px}
  .reason .ic-svg{width:14px;height:14px;vertical-align:-2px;margin-right:4px}
  /* タスク7: プロンプターモード */
  .prompter{position:fixed;inset:0;z-index:200;background:#1a1a2e;color:#fff;display:flex;flex-direction:column}
  .prompter .pr-close{position:absolute;top:16px;right:16px;z-index:2;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:15px;font-weight:800;border-radius:999px;padding:9px 16px;cursor:pointer}
  .prompter .pr-scroll{overflow-y:auto;padding:64px 7vw 80px;max-width:1000px;margin:0 auto;width:100%}
  .prompter .pr-who{color:#E0B14A;font-size:14px;font-weight:800;letter-spacing:.08em;margin-bottom:24px}
  .prompter .pr-sec{margin-bottom:30px}
  .prompter .pr-h{font-size:13px;color:#9aa3c7;font-weight:800;letter-spacing:.04em;margin-bottom:8px}
  .prompter .pr-b{font-size:24px;line-height:1.65;font-weight:600}
  @media(max-width:560px){ .prompter .pr-b{font-size:21px} .prompter .pr-scroll{padding:60px 6vw 70px} }
  /* タスク8: フィルタ用セレクト */
  .fsel{border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;font-family:inherit;background:#fff;color:var(--ink);min-width:150px;cursor:pointer}
  .fsel:focus{outline:none;border-color:var(--em)}
  /* タスク1/3: SNSシェアボタン */
  .vcard-outer{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(17,24,39,.03)}
  .vcard-outer .vcard{border:0;border-radius:0;box-shadow:none}
  .vcard-outer .share-row{border-top:1px solid var(--line)}
  .share-row{display:flex;gap:7px;flex-wrap:wrap;padding:10px 14px 14px}
  .share-btn{flex:1 1 auto;min-width:0;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .12s ease;font-family:inherit}
  .share-btn:hover{transform:translateY(-1px);border-color:var(--em)}
  .share-btn .ic-svg{width:15px;height:15px}
  .share-btn.x{background:#15171a;color:#fff;border-color:#15171a}
  .share-btn.ig{background:linear-gradient(120deg,#ff6b9d,#ff8c42);color:#fff;border:0}
  .share-btn.copied{background:var(--em-soft);color:var(--em-dark);border-color:var(--em)}
  .btn-x{background:#15171a;color:#fff}
  /* タスク2: 達成カード（ゴールド系） */
  .ach-card{width:min(92vw,420px);background:linear-gradient(150deg,#f6d365,#fda085);border-radius:22px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(0,0,0,.5)}
  .ach-top{padding:30px 24px 16px;text-align:center;color:#fff}
  .ach-top .ic-svg{width:54px;height:54px;color:#fff;filter:drop-shadow(0 4px 10px rgba(0,0,0,.18))}
  .ach-top span{display:block;font-size:26px;font-weight:900;margin-top:8px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
  .ach-body{background:#fff;margin:0 14px 14px;border-radius:16px;padding:22px 20px;text-align:center}
  .ach-main{font-size:20px;font-weight:900;color:#b06a16;margin-bottom:16px}
  .ach-badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  .ach-b{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:#8a6a14;font-weight:800;font-size:12.5px;border-radius:999px;padding:7px 13px}
  .ach-b .ic-svg{width:15px;height:15px}
  .ach-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  /* タスク3: コーチ発信セクション */
  .coachpost textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:13.5px;font-family:inherit;color:var(--ink);line-height:1.7;resize:vertical;background:var(--em-tint)}
  /* タスク4: 実績サマリーカード */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sum-card{background:#fff;border:1px solid var(--line);border-left:4px solid #1a1a5e;border-radius:14px;padding:18px 20px}
  .sum-card .n{font-size:32px;font-weight:900;color:#1a1a5e;line-height:1.05;letter-spacing:-.01em}
  .sum-card .l{font-size:12px;color:var(--mut);margin-top:5px;font-weight:600}
  .sum-card .d{font-size:11px;font-weight:800;color:var(--gold);margin-top:6px}
  @media(max-width:680px){ .summary-grid{grid-template-columns:1fr} }
  /* タスク5: ログイン著名コーチスライダー */
  .coach-slider{position:relative;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;margin-bottom:18px;min-height:148px}
  .coach-slider .slides{display:flex;transition:transform .5s ease}
  .coach-slider .slide{min-width:100%;box-sizing:border-box;padding:22px 22px 20px;position:relative}
  .coach-slider .soon{position:absolute;top:12px;right:12px;background:#f6d365;color:#1a1a2e;font-size:10px;font-weight:900;border-radius:999px;padding:4px 10px;letter-spacing:.03em}
  .coach-slider .s-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#e7d4a0,#caa44e);color:#2a2008;display:grid;place-items:center;font-weight:900;font-size:20px;margin-bottom:12px}
  .coach-slider .s-role{font-size:11px;font-weight:800;letter-spacing:.08em;color:#f6d365}
  .coach-slider .s-name{font-size:19px;font-weight:900;margin:3px 0 6px}
  .coach-slider .s-msg{font-size:12.5px;color:#c7cee4;line-height:1.6}
  .coach-slider .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:6px;justify-content:center}
  .coach-slider .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s}
  .coach-slider .dots i.on{background:#f6d365;width:18px;border-radius:999px}
  /* AIの顔＝アナウンサーアイコン */
  .aiface{display:inline-grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,#ff9ab8,#f5427a);color:#fff;flex:0 0 auto;box-shadow:0 6px 14px -8px rgba(245,66,122,.6)}
  .aiface .ic-svg{width:60%;height:60%}
  body.theme-pro .aiface{background:linear-gradient(135deg,#e7d4a0,#b68a2a);color:#3a2b08}
  .ai .ai-head{display:flex;align-items:center;gap:11px}
  .ai .ai-name{font-size:14px;font-weight:900}
  .ai .ai-sub{font-size:11.5px;color:var(--mut);font-weight:700}
  /* タスク1: 相性診断 */
  .match-hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:linear-gradient(120deg,var(--em-tint),var(--card));border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .match-ring{width:92px;height:92px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:conic-gradient(var(--em) calc(var(--m)*1%), var(--em-soft) 0);position:relative}
  .match-ring::after{content:'';position:absolute;inset:8px;background:var(--card);border-radius:50%}
  .match-ring b{position:relative;z-index:1;font-size:24px;font-weight:900;color:var(--em-dark)}
  .match-ring small{position:relative;z-index:1;font-size:9px;color:var(--mut);display:block;text-align:center;margin-top:-2px}
  .coach-row{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px dashed var(--line)}
  .coach-row:last-child{border-bottom:0}
  .coach-row .cav{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#ff9ab8,#f5427a);color:#fff;display:grid;place-items:center;font-weight:900;font-size:18px;flex:0 0 auto}
  .coach-row .cav .ic-svg{width:24px;height:24px}
  .coach-row .cm{flex:1;min-width:0}
  .coach-row .cm b{font-size:14px} .coach-row .cm .ct{font-size:11.5px;color:var(--mut)}
  .coach-row .cmatch{text-align:right;flex:0 0 auto}
  .coach-row .cmatch .pct{font-size:20px;font-weight:900;color:var(--em-deep)} .coach-row .cmatch .lb{font-size:10px;color:var(--mut)}
  .tier-badge{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;font-weight:900;font-size:14px}
  .tier-badge.gold{background:var(--gold-soft);color:#8a6a14} .tier-badge.em{background:var(--em-soft);color:var(--em-dark)} .tier-badge.blue{background:var(--blue-soft);color:#2a6fb5} .tier-badge.warn{background:var(--warn-soft);color:#a8401f}
  .cap-bar{height:7px;background:var(--em-tint);border-radius:999px;overflow:hidden;min-width:90px}
  .cap-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--em),var(--em-deep))}
  /* 女子アナ専属プランのヒアリング（選択式）＋プラン提案 */
  .hear-q{padding:14px 0;border-bottom:1px dashed var(--line)} .hear-q:last-of-type{border-bottom:0}
  .hear-q .qh{font-size:13.5px;font-weight:800;margin-bottom:9px;display:flex;gap:8px}
  .hear-q .qn{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--pink-soft);color:#b53a63;font-size:11px;font-weight:900;display:grid;place-items:center}
  .hear-opts{display:flex;flex-direction:column;gap:8px}
  .hear-opt{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:11px 13px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;color:var(--ink);font-family:inherit;transition:all .12s ease}
  .hear-opt:hover{border-color:var(--pink)}
  .hear-opt .rad{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center}
  .hear-opt.on{border-color:var(--pink);background:#fff0f5;color:#b53a63}
  .hear-opt.on .rad{border-color:var(--pink)} .hear-opt.on .rad::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--pink)}
  .hear-prog{height:7px;background:var(--pink-soft);border-radius:999px;overflow:hidden;margin:4px 0 2px}
  .hear-prog i{display:block;height:100%;background:linear-gradient(90deg,#ff9ab8,#f5427a)}
  .reco{background:linear-gradient(135deg,#ff6b9d,#ff8c42);color:#fff;border-radius:18px;padding:22px;margin-top:16px}
  .reco .rl{font-size:11px;font-weight:800;letter-spacing:.06em;opacity:.95}
  .reco .rn{font-size:23px;font-weight:900;margin:4px 0 2px}
  .reco .rp{font-size:15px;font-weight:800} .reco .rp small{font-size:11px;opacity:.9;font-weight:600}
  .reco .rt{font-size:12.5px;opacity:.96;margin:8px 0 0}
  .reco .runlock{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);border-radius:12px;padding:12px 14px;margin-top:14px}
  .reco .runlock b{font-size:11.5px;display:block;margin-bottom:6px}
  .reco .runlock .ul{display:flex;flex-direction:column;gap:6px}
  .reco .runlock .ul span{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;font-weight:600}
  .reco .runlock .ul span .ic-svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px}
  .reco .ract{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .btn-white{background:#fff;color:#b53a63;font-weight:800}
  .btn-line{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.7)}
  .plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
  .plan-card{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff;position:relative;display:flex;flex-direction:column}
  .plan-card.reco-on{border:2px solid var(--pink);box-shadow:0 14px 34px -22px rgba(245,66,122,.55)}
  .plan-card .pbadge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#ff6b9d,#ff8c42);color:#fff;font-size:9.5px;font-weight:900;border-radius:999px;padding:3px 11px;white-space:nowrap}
  .plan-card .pn{font-size:14px;font-weight:900} .plan-card .pp{font-size:18px;font-weight:900;margin:6px 0 0;color:var(--ink)} .plan-card .ps{font-size:10px;color:var(--mut)}
  .plan-card .pf{list-style:none;padding:0;margin:11px 0 0;display:flex;flex-direction:column;gap:7px}
  .plan-card .pf li{font-size:11.5px;color:var(--ink-2);display:flex;align-items:flex-start;gap:6px;font-weight:600}
  .plan-card .pf li .ic-svg{width:13px;height:13px;color:var(--em);flex:0 0 auto;margin-top:2px}
  .plan-card .pcta{margin-top:14px}
  @media(max-width:760px){ .plan-grid{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:80%;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:8px 0 6px} .plan-card{scroll-snap-align:center} }
  /* 法人プラン＆コーチ・マッチング */
  .tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  @media(max-width:980px){ .tier-grid{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:62%;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px} }
  .tier{border:1px solid var(--line);border-radius:14px;padding:16px 14px;background:var(--card);position:relative;scroll-snap-align:center;display:flex;flex-direction:column}
  body.theme-pro .tier{background:#0f1d52;border-color:#24306a;color:#fff}
  .tier.on{border:2px solid var(--gold);box-shadow:0 16px 38px -24px rgba(224,177,74,.6)}

<script>
/* =========================================================================

     → 本番は各 generate*() / aiBrief() を LLM 呼び出しに置き換える（TODO参照）
   ========================================================================= */

/* ---------- マスタ ---------- */
var ME = { name:'田中 翔太', company:'株式会社ネクステージ', position:'営業 2年目',
  salesType:'反骨成長型クローザー', emoji:'', streak:23 };

var MEMBERS = [

  {id:'m2', name:'佐藤 美咲', dept:'第一営業部', mood:[2,2,1], submit:[1,0,0], score:58, trend:'down', flags:['気分スコアが3日連続低下','日報未提出が2日'], coach:false, achiever:false, risk:'mid'},
  {id:'m3', name:'鈴木 健',   dept:'第二営業部', mood:[4,4,4], submit:[1,1,1], score:90, trend:'up',   flags:[], coach:false, achiever:true, risk:'lo'},
  {id:'m4', name:'高橋 由依', dept:'第二営業部', mood:[3,2,2], submit:[0,0,0], score:49, trend:'down', flags:['日報未提出が3日連続','成長スコア急落'], coach:true,  achiever:false, risk:'hi'},
  {id:'m5', name:'伊藤 大和', dept:'第一営業部', mood:[3,3,3], submit:[1,1,1], score:74, trend:'flat', flags:['コーチング希望あり'], coach:true,  achiever:false, risk:'lo'},
  {id:'m6', name:'渡辺 彩',   dept:'第三営業部', mood:[4,3,3], submit:[1,1,1], score:78, trend:'up',   flags:[], coach:false, achiever:false, risk:'lo'},
  {id:'m7', name:'山本 蓮',   dept:'第三営業部', mood:[2,2,2], submit:[1,1,0], score:61, trend:'down', flags:['目標未達が続いている','上司面談希望あり'], coach:false, achiever:false, risk:'mid'}
];
// 顔写真：許諾済み（Q4=A）。photo にURLを入れると顔写真表示、無ければイニシャルにフォールバック
function faceCell(name, photo, sz, cls){ sz=sz||56; if(photo) return '<div class="face '+(cls||'')+'" style="width:'+sz+'px;height:'+sz+'px;background-image:url('+photo+')"></div>'; return '<div class="face initial '+(cls||'')+'" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*0.36)+'px">'+avatarText(name)+'</div>'; }

/* ===== ① 日記テキストマイニング（離職予兆・本音）。本文は本人のみ＝管理者はシグナルのみ（Q13） ===== */
var MEMBER_DIARY={
  m1:['今日は架電が乗ってきて手応えがあった。チームで共有できたのが嬉しい。','クロージングで一歩踏み込めた。明日も続けたい。'],
  m2:['最近うまくいかない。正直しんどいし、評価されない気がして不安。','相談できる人がいなくて孤立している感じ。少し疲れた。'],
  m3:['目標達成できて自信がついた。やりがいを感じる。','後輩にも教えられて成長を実感。'],
  m4:['もう限界かもしれない。プレッシャーがきつくて辞めたいと思うことがある。','日報を書く余裕もない。報われない。'],
  m5:['伸び悩んでいる。コーチに相談したい。焦りはあるけど前向きにやれている。'],

  m7:['目標未達が続いて自信をなくしている。きつい。上司に話を聞いてほしい。不安が大きい。']
};
var RISK_WORDS=['辞め','やめ','限界','無理','きつ','しんど','疲れ','評価されない','報われない','孤立','相談できない','相談したい','プレッシャー','不安','焦り','自信をなく','余裕がない'];
var POS_WORDS=['楽しい','成長','達成','嬉しい','自信がつい','やりがい','前向き','手応え','チーム','勝て','刺さっ'];
function mineText(memberId){
  var arr=MEMBER_DIARY[memberId]||[]; var text=arr.join(' ');
  var hits=RISK_WORDS.filter(function(w){return text.indexOf(w)>=0;});
  var pos=POS_WORDS.filter(function(w){return text.indexOf(w)>=0;});
  var score=Math.max(0,Math.min(100, 50 - hits.length*12 + pos.length*8));
  var level= score<35?'high': score<55?'mid':'lo';
  var summary = hits.length ? ('ネガティブ語「'+hits.slice(0,3).join('」「')+'」を検出。早めの声かけ推奨。') : '前向きな語が中心で、本音も安定傾向。';
  return { riskWords:hits, posWords:pos, score:score, level:level, summary:summary, count:arr.length };
}
function orgTopWords(){
  var c={}; Object.keys(MEMBER_DIARY).forEach(function(id){ var t=MEMBER_DIARY[id].join(' '); RISK_WORDS.concat(POS_WORDS).forEach(function(w){ if(t.indexOf(w)>=0) c[w]=(c[w]||0)+1; }); });
  return Object.keys(c).map(function(w){return {w:w,n:c[w],risk:RISK_WORDS.indexOf(w)>=0};}).sort(function(a,b){return b.n-a.n;}).slice(0,14);
}

/* ===== ② サンクスポイント（感謝で承認・定着。承認エンジンと連動 Q10/Q11） ===== */
var THANKS=[
  {from:'渡辺 彩', to:'鈴木 健', pts:3, msg:'クロージングのコツ教えてくれてありがとう！'},
  {from:'伊藤 大和', to:'田中 翔太', pts:2, msg:'架電のロープレ付き合ってくれて感謝。'},

  {from:'鈴木 健', to:'田中 翔太', pts:3, msg:'いつも場を盛り上げてくれてありがとう。'}

var THANKS_TARGETS=['鈴木 健','佐藤 美咲','高橋 由依','伊藤 大和','渡辺 彩','山本 蓮','三上 あかり（※サンプル コーチ）'];
function thanksRanking(){ var m={}; THANKS.forEach(function(t){ m[t.to]=(m[t.to]||0)+t.pts; }); return Object.keys(m).map(function(n){return {name:n,pts:m[n]};}).sort(function(a,b){return b.pts-a.pts;}); }

/* ===== ③ 顔ナビ：コーチ×営業 相性マップ（決定的な擬似スコア） ===== */
function memberCoachAffinity(m, coach){
  var s=0,str=m.name+'|'+coach.id; for(var i=0;i<str.length;i++){ s=(s*31+str.charCodeAt(i))%1000; }
  return 55 + (s%41); // 55〜95
}
function hash(str){ var s=0; for(var i=0;i<str.length;i++){ s=(s*31+str.charCodeAt(i))%1000; } return s; }

/* ===== ④ 営業スキルマップ（Q8：架電・メンタル等を多軸可視化） ===== */
var SKILL_AXES=['架電力','ヒアリング力','提案力','クロージング力','メンタル・継続力','関係構築力'];
function memberSkills(m){
  return SKILL_AXES.map(function(a,i){ var s=hash(m.name+'#'+i); return {axis:a, val:clamp(Math.round(m.score*0.5 + (s%100)*0.5),22,99)}; });
}
function radarSVG(skills,size){
  size=size||230; var cx=size/2, cy=size/2, R=size/2-30, n=skills.length;
  function pt(i,r){ var ang=-Math.PI/2 + i*2*Math.PI/n; return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r]; }
  var grid=[25,50,75,100].map(function(g){ var pts=skills.map(function(s,i){var p=pt(i,R*g/100);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '); return '<polygon points="'+pts+'" fill="none" stroke="var(--line)"/>'; }).join('');
  var axes=skills.map(function(s,i){var p=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="var(--line)"/>';}).join('');
  var dataPts=skills.map(function(s,i){var p=pt(i,R*s.val/100);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var labels=skills.map(function(s,i){var p=pt(i,R+16); var anchor=Math.abs(p[0]-cx)<6?'middle':(p[0]>cx?'start':'end'); return '<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" font-size="9" fill="var(--mut)" text-anchor="'+anchor+'" dominant-baseline="middle">'+s.axis+'</text>';}).join('');
  return '<svg viewBox="0 0 '+size+' '+size+'" style="width:100%;max-width:'+size+'px;display:block;margin:0 auto">'+grid+axes+'<polygon points="'+dataPts+'" fill="rgba(245,66,122,.18)" stroke="var(--pink)" stroke-width="2"/>'+labels+'</svg>';
}

/* ===== ⑤ ハイパフォーマー分析（Q9=複合：成約・粗利・継続・離職しない） ===== */
var MEMBER_PERF={
  m1:{deals:5,gp:680,tenure:24,retention:90}, m2:{deals:1,gp:120,tenure:8,retention:45},
  m3:{deals:6,gp:760,tenure:30,retention:95}, m4:{deals:1,gp:90,tenure:6,retention:30},
  m5:{deals:3,gp:420,tenure:18,retention:75}, m6:{deals:4,gp:540,tenure:14,retention:82},
  m7:{deals:2,gp:260,tenure:10,retention:55}
};
function performScore(m){ var p=MEMBER_PERF[m.id]||{deals:0,gp:0,tenure:0,retention:50};
  var sDeals=Math.min(100,p.deals/6*100), sGp=Math.min(100,p.gp/800*100), sTen=Math.min(100,p.tenure/36*100), sRet=p.retention;
  return Math.round(sDeals*0.35 + sGp*0.3 + sRet*0.2 + sTen*0.15); }
function topPerformers(){ return MEMBERS.slice().map(function(m){return {m:m,ps:performScore(m)};}).sort(function(a,b){return b.ps-a.ps;}); }
function commonTraits(){
  var top=topPerformers().slice(0,3).map(function(x){return x.m;}); var t=[];
  var avgSubmit=top.reduce(function(a,m){return a+m.submit.reduce(function(x,y){return x+y;},0);},0)/(top.length*3);

  t.push('クロージング力・架電力が平均より高い'); t.push('成長スコアが継続的に上昇傾向');
  return {top:top, traits:t};
}

/* ===== ⑥ パルスサーベイ / eNPS（Q1 エンゲージメント） ===== */
var PULSE={ responses:[ {name:'鈴木 健',cond:5,enps:9},{name:'渡辺 彩',cond:4,enps:8},{name:'伊藤 大和',cond:3,enps:7},{name:'山本 蓮',cond:2,enps:4},{name:'佐藤 美咲',cond:2,enps:5},{name:'高橋 由依',cond:2,enps:3} ], myDone:false };
function enpsScore(){ var r=PULSE.responses; if(!r.length)return 0; var pro=r.filter(function(x){return x.enps>=9;}).length, det=r.filter(function(x){return x.enps<=6;}).length; return Math.round((pro-det)/r.length*100); }
function avgCondition(){ var r=PULSE.responses; return r.length?(r.reduce(function(a,x){return a+x.cond;},0)/r.length).toFixed(1):'—'; }

/* ===== ⑦ 管理者向けAIインサイト・チャット（TP タレントAIインサイト） ===== */
var INSIGHT_THREAD=[];
var INSIGHT_SUGGEST=['離職予兆が高いのは誰？','成約が高い人の共通点は？','コンディションが落ちているのは？','コーチングを優先すべきは？'];
function answerInsight(q){
  q=q||'';
  if(/離職|予兆|辞め|リスク/.test(q)){ var hi=MEMBERS.map(function(m){return {m:m,r:mineText(m.id)};}).filter(function(x){return x.r.level==='high';}); return hi.length?('離職予兆が高いのは '+hi.map(function(x){return x.m.name;}).join('・')+' の'+hi.length+'名。日記から「'+(hi[0].r.riskWords.slice(0,2).join('」「'))+'」等を検出。早めの1on1を推奨します。'):'現在、離職予兆“高”のメンバーはいません。'; }
  if(/共通点|ハイパフォ|成約|できる人|トップ|売れ/.test(q)){ var ct=commonTraits(); return '成果上位は '+ct.top.map(function(m){return m.name;}).join('・')+'。共通点は『'+ct.traits.join('』『')+'』。育成・採用基準に活用できます。'; }
  if(/コンディション|気分|落ち|疲|元気/.test(q)){ var low=MEMBERS.filter(function(m){return m.mood[m.mood.length-1]<=2;}); return low.length?('コンディション低下は '+low.map(function(m){return m.name;}).join('・')+'。eNPS '+enpsScore()+'／平均コンディション '+avgCondition()+' も合わせて要注意。'):'目立ったコンディション低下はありません（eNPS '+enpsScore()+'）。'; }
  if(/コーチング|優先|フォロー|面談/.test(q)){ var f=MEMBERS.filter(function(m){return m.risk!=='lo';}); return 'コーチング優先は '+f.map(function(m){return m.name+'（'+(m.flags[0]||'要観察')+'）';}).join('、')+'。'; }
  if(/部署|チーム/.test(q)){ var d={}; MEMBERS.forEach(function(m){ (d[m.dept]=d[m.dept]||[]).push(m.score); }); var arr=Object.keys(d).map(function(k){return k+'：平均'+Math.round(d[k].reduce(function(a,b){return a+b;},0)/d[k].length);}); return '部署別の平均成長スコアは '+arr.join(' ／ ')+' です。'; }
  return 'データから分析します。「離職予兆」「成約の共通点」「コンディション低下」「コーチング優先」「部署別」などで聞くと具体的に回答します。（実Claude接続でさらに自由な分析が可能です）';
}

/* ===== ⑧ AIトークトレ（TP AIトークトレ）：営業トークのロープレ練習 ===== */

function scoreTalk(scn, answer){
  var a=answer||''; var hits=scn.good.filter(function(w){return a.indexOf(w)>=0;}).length;
  var hasQ=/[？?]/.test(a), len=a.length;
  var score=clamp(38 + hits*12 + (hasQ?15:0) + (len>=20?12:0),0,100);
  var fb=[]; if(!hasQ) fb.push('質問で相手に話させると深掘りできます');
  if(hits<2) fb.push('「'+scn.good.slice(1,4).join('／')+'」等の観点を入れると刺さります');
  if(len<15) fb.push('具体例や数字を添えると説得力が増します');
  if(!fb.length) fb.push('良い切り返しです。次アクションまで握れると完璧');
  return {score:score, fb:fb};
}

var SERVER=false, USER=null, AI_ENABLED=false;

function collectData(){ return { streak:ME.streak, mood:state.mood, diary:state.diary, aiComment:state.aiComment, goals:GOALS, videos:MY_VIDEOS, personality:state.personality, vision:state.vision, onbAnswers:state.onbAnswers, onboarding:state.onboarding, assignedCoach:state.assignedCoach }; }
function applyData(d){ if(!d) return;
  if(typeof d.streak==='number') ME.streak=d.streak;
  if(d.mood) state.mood=Object.assign(state.mood,d.mood);
  if(d.diary) state.diary=Object.assign(state.diary,d.diary);

function visionSummary(){
  var v=state.vision||{}; var p=[];

// 実LLM呼び出し（kindでサーバーが実行 or スタンドアロンはブラウザ直叩き）。null=モックにフォールバック。
async function aiCall(kind, input, schema, system){
  if(SERVER && USER){
    if(!AI_ENABLED) return null; // サーバーにキー未設定 → モック
    var r=await fetch('/api/ai',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({kind:kind, input:input})});
    if(!r.ok){ var e=await r.json().catch(function(){return{};}); throw new Error(e.error||('AI '+r.status)); }
    return await r.json();
  }
  if(cfg.live && cfg.apiKey){ var txt=await callClaude(system, input, schema); return JSON.parse(txt); }
  return null;
}

// 実LLM呼び出し（ブラウザ直叩き：PoC専用）。本番はサーバ関数経由に置換。
async function callClaude(system, userText, schema){
  var body={ model:cfg.model||'claude-opus-4-8', max_tokens:1024, system:system, messages:[{role:'user', content:userText}] };
  if(schema){ body.output_config={ format:{ type:'json_schema', schema:schema } }; }
  var res=await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':cfg.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify(body)
  });
  if(!res.ok){ var t=await res.text(); throw new Error('API '+res.status+'：'+t.slice(0,160)); }
  var data=await res.json();
  return (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
}

function sparkline(data,w,h){
  w=w||320;h=h||74;var max=Math.max.apply(null,data),min=Math.min.apply(null,data);var pad=8;
  var pts=data.map(function(v,i){var x=pad+i*((w-pad*2)/(data.length-1));var y=h-pad-((v-min)/((max-min)||1))*(h-pad*2);return [x,y];});
  var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var area='8,'+(h-pad)+' '+poly+' '+(w-pad)+','+(h-pad);var last=pts[pts.length-1];
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polygon class="area" points="'+area+'"/><polyline points="'+poly+'"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5"/></svg>';
}

function followerScore(followers){ var lo=1000,hi=10000000; if(followers<=lo) return 0; var s=(Math.log10(followers)-Math.log10(lo))/(Math.log10(hi)-Math.log10(lo))*100; return clamp(Math.round(s),0,100); }

var SNS_WEIGHTS={ instagram:1.0, tiktok:0.8, x:0.6, youtube:1.0 };
function weightedFollowers(c){
  if(!c.snsFollowers){ return c.followers||0; }
  var s=c.snsFollowers, w=SNS_WEIGHTS;
  return Math.round((s.instagram||0)*w.instagram + (s.tiktok||0)*w.tiktok + (s.x||0)*w.x + (s.youtube||0)*w.youtube);
}
function recomputeCoach(c){ if(!c.snsFollowers) c.snsFollowers={instagram:c.followers||0}; c.followers=weightedFollowers(c); c.F=followerScore(c.followers); c.K=coefficientK(c.F,c.C); c.rank=rankFromK(c.K); c.brandSafetyOk=(c.brandSafetyOk!==false); c.isPublished=(c.isPublished!==false); c.available=(c.available!==false); if(c.isRosterListed===undefined) c.isRosterListed=true; return c; }
function recomputeAll(){ B2B_COACHES.forEach(recomputeCoach); recomputeCoach(MY_COACH); }
B2B_COACHES.forEach(recomputeCoach);
// ペアコーチ（薪）＝継続実務・メンタル・反復。現役ではないのでスケジュール自由

var COST={ guideRate:{STARTER:30000,DRIVE:30000,PRO:45000,ELITE:60000,LEGEND:90000}, athletePerf:150000, pairCoach:40000, opsFixed:60000, content:40000 };

  var guide=p.sessions*(COST.guideRate[p.id]||30000);
  var athlete=p.athleteQuota*COST.athletePerf;
  var pair=p.athleteQuota*COST.pairCoach;
  var cost=guide+athlete+pair+COST.opsFixed+COST.content;
  var gp=p.price-cost;
  return { guide:guide, athlete:athlete, pair:pair, ops:COST.opsFixed, content:COST.content, cost:cost, gp:gp, margin:gp/p.price };
}

  LEGEND: {S:130000,A:95000,B:65000,C:48000,D:38000}
};
function rewardFor(planId,rank){ return (REWARD_MATRIX[planId]||{})[rank]||0; }
// 想定報酬：アクセスされうるプラン帯のうち最高額（その人の上限想定）
function expectedReward(coach){
  var need=minPlanForK(coach.K), start=PLAN_TIERS.indexOf(need), best=0, bestPlan=null;
  for(var i=start;i<PLAN_TIERS.length;i++){ var r=rewardFor(PLAN_TIERS[i].id,coach.rank); if(r>best){ best=r; bestPlan=PLAN_TIERS[i]; } }
  return { yen:best, plan:bestPlan };
}

var PROGRAM={ themes:['メンタル基礎','クロージング強化','チーム文化づくり'], monthIndex:1, sessionsThisMonth:2, sessionsPerMonth:3 };

function eligibleCoaches(plan){
  return B2B_COACHES.filter(function(c){return c.isPublished&&c.available&&c.brandSafetyOk&&!c.isActiveAthlete;})
    .filter(function(c){return c.K<=plan.ceiling;})
    .sort(function(a,b){return b.K-a.K;})
    .slice(0, plan.listLimit==null?Infinity:plan.listLimit);
}
function lockedCoaches(plan){ // 上限超え＝上位プランで指名可（アップセル）
  return B2B_COACHES.filter(function(c){return c.isPublished&&c.brandSafetyOk&&!c.isActiveAthlete&&c.K>plan.ceiling;}).sort(function(a,b){return b.K-a.K;});
}
function minPlanForK(K){ for(var i=0;i<PLAN_TIERS.length;i++){ if(K<=PLAN_TIERS[i].ceiling) return PLAN_TIERS[i]; } return PLAN_TIERS[PLAN_TIERS.length-1]; }
function activeAthletes(sport){ var ho={rising:0,established:1,headliner:2}; return B2B_COACHES.filter(function(c){return c.isActiveAthlete&&c.isRosterListed&&(!sport||c.sport===sport);}).sort(function(a,b){ var d=(ho[a.heatTier||'rising'])-(ho[b.heatTier||'rising']); return d!==0?d:b.K-a.K; }); }

  + '</div>';

    + '<li>打ち手③：面談の主力を“熱がこれからの選手”に固定し、選手出演料を¥150k前後に抑えると PRO以上の粗利が安定。</li>'

    + '</ul></div>';

// 女子アナ専属プラン：選択式ヒアリング → 最適プラン提案（購入導線）
function planHearingSection(){
  var an=assignedAnnouncer();
  var qs=HEAR_Q.map(function(q,qi){
    var opts=q.opts.map(function(o,oi){
      var on=PLAN_HEAR[q.id]===oi;
      return '<button class="hear-opt'+(on?' on':'')+'" data-hearpick="'+q.id+':'+oi+'"><span class="rad"></span>'+o.t+'</button>';
    }).join('');
    return '<div class="hear-q"><div class="qh"><span class="qn">'+(qi+1)+'</span>'+q.q+'</div><div class="hear-opts">'+opts+'</div></div>';
  }).join('');
  var reco=planReco(); var pct=Math.round(reco.answered/reco.total*100);
  var isUp = reco.key!=='standard';
  var unlock = isUp
    ? '<div class="runlock"><b>'+reco.plan.name+'で、いま解放される体験</b><div class="ul">'+reco.plan.feats.map(function(f){return '<span>'+svg('check')+f+'</span>';}).join('')+'</div></div>'
    : '<div class="runlock"><b>いまのStandardで使える機能</b><div class="ul">'+PLANS.standard.feats.map(function(f){return '<span>'+svg('check')+f+'</span>';}).join('')+'</div></div>';
  var recoCard='<div class="reco"><div class="rl">'+(reco.answered?'あなたの回答から、AIのおすすめは':'多くの方に選ばれているのは')+'</div>'
    + '<div class="rn">'+reco.plan.name+'</div>'
    + '<div class="rp">'+reco.plan.price+' <small>'+(reco.plan.sub||'')+'</small></div>'
    + '<div class="rt">'+reco.plan.tagline+(isUp?'　— '+an.name+'があなた専属の伴走者に。':'')+'</div>'
    + unlock
    + '<div class="ract">'+(isUp
        ? '<button class="btn btn-white" data-planapply="'+reco.key+'">'+svg('sparkles')+'このプランで申し込む</button><button class="btn btn-line" data-planconsult="1">'+svg('message')+'女子アナに相談する</button>'
        : '<button class="btn btn-white" data-planapply="premium">'+svg('sparkles')+'Premiumを見てみる</button>')+'</div></div>';
  // 3プラン比較（おすすめをハイライト）
  var order=['standard','premium','premiumPlus'];
  var grid='<div class="plan-grid">'+order.map(function(k){
    var p=PLANS[k]; var on=(k===reco.key);
    var cta = k==='standard'
      ? '<button class="btn btn-soft btn-sm pcta" disabled style="width:100%">いまのプラン</button>'
      : '<button class="btn '+(on?'btn-em':'btn-ghost')+' btn-sm pcta" data-planapply="'+k+'" style="width:100%">このプランにする</button>';
    return '<div class="plan-card'+(on?' reco-on':'')+'">'+(on&&k!=='standard'?'<span class="pbadge">あなたにおすすめ</span>':'')
      + '<div class="pn">'+p.name+'</div><div class="pp">'+p.price+'</div><div class="ps">'+(p.sub||p.tagline)+'</div>'
      + '<ul class="pf">'+p.feats.map(function(f){return '<li>'+svg('check')+f+'</li>';}).join('')+'</ul>'+cta+'</div>';
  }).join('')+'</div>';
  return '<div class="card" style="margin-bottom:16px">'+secH('announcer','女子アナ専属プラン診断（30秒）')
    + '<p class="muted" style="margin:-6px 0 10px;font-size:12px">5つの質問に答えると、'+an.name+'たちホリプロアナウンサーとの、あなたにぴったりの関わり方が見つかります。</p>'
    + '<div class="hear-prog"><i style="width:'+pct+'%"></i></div><div class="muted" style="font-size:11px;text-align:right;margin-bottom:6px">'+reco.answered+' / '+reco.total+' 問</div>'
    + qs + recoCard + grid
    + '<p class="muted" style="font-size:10.5px;margin:12px 0 0">※価格・特典は実証実験用のサンプル表示です。実際のプラン内容は変更される場合があります。</p></div>';
}

function wrapCanvasText(x,text,cx,cy,maxW,lh){
  var chars=(text||'').split(''),line='',y=cy;
  for(var i=0;i<chars.length;i++){ var test=line+chars[i]; if(x.measureText(test).width>maxW && line){ x.fillText(line,cx,y); line=chars[i]; y+=lh; } else { line=test; } }

}

// タスク3: コーチ変更体験（理由→AI分析→次のコーチ提案→今までのコーチへ感謝メッセージ）
function suggestCoachFromReason(reason){
  var r=reason||''; var curId=(state.assignedCoach&&state.assignedCoach.id)||COACHES[0].id;
  var cands=COACHES.filter(function(c){return c.id!==curId;});
  function pick(cat){ return cands.filter(function(c){return c.category===cat;})[0]; }
  var why='', chosen;
  // 強度の方向を先に判定（「もっと厳しく」と「厳しすぎる」を取り違えない）
  var wantsStrict=/もっと厳|厳しく|追い込|喝|本気|ぬる|甘え|物足/.test(r);
  var wantsGentle=/優しく|穏やか|聞いてほし|厳しすぎ|怖|詰め|プレッシャ|きつ|寄り添/.test(r);
  if(wantsStrict){ chosen=pick('athlete'); why='「もっと厳しく背中を押してほしい」という声から、結果志向のファイター型を選びました。'; }
  else if(wantsGentle){ chosen=pick('announcer')||pick('model'); why='「もっと穏やかに向き合ってほしい」という声から、傾聴型のアナウンサーを選びました。'; }
  else if(/数字|戦略|論理|分析|具体/.test(r)){ chosen=pick('coach'); why='「数字や戦略で導いてほしい」という声から、論理・分析型コーチを選びました。'; }
  else if(/話しにく|合わ|距離|相性/.test(r)){ chosen=pick('model')||pick('announcer'); why='「もっと話しやすい関係に」という声から、伴走・自己肯定型を選びました。'; }
  if(!chosen){ chosen=cands.sort(function(a,b){return b.rating-a.rating;})[0]; why='ご希望と営業タイプ診断をもとに、相性の高いコーチを選びました。'; }
  return { coach:chosen, why:why };
}

// 100問の診断結果（上位の軸）から営業タイプ（personality）を確定し、相性診断・コーチ選定に反映
var AXIS_SALESTYPE={ compete:'反骨成長型クローザー', challenge:'スピード行動型', selfdrive:'自走・裁量型', reward:'目標達成ドリブン型', approval:'承認モチベート型', relation:'関係構築型', empathy:'共感・傾聴型', growth:'成長志向型', purpose:'意義ドリブン型', stability:'継続・安定型' };
var AXIS_JA_S={compete:'勝ち負け',approval:'承認',growth:'成長',reward:'報酬・地位',relation:'チーム',purpose:'意義',stability:'継続',empathy:'対話・共感',challenge:'挑戦',selfdrive:'自分軸'};
function setPersonalityFromAxes(top){
  var P=(typeof mockPersonality==='function')?mockPersonality():{};
  P.salesType=AXIS_SALESTYPE[top[0]]||P.salesType||'バランス型';
  P.growthType='急成長型';
  P.strengths=(top||[]).slice(0,3).map(function(a){return AXIS_JA_S[a]||a;}).concat(P.strengths||[]).slice(0,4);
  P.diagnosedBy100=true;
  state.personality=P;
}
/* ① オンボーディング送信 → ペルソナ判定 → 女子アナ自動アサイン */
async function submitOnboarding(){
  var ax=onbAxisScores(); var ans=onbAnswered();
  if(ans<10){ toast('もう少し回答してください（10問以上）'); return; }
  var btn=el('onbSubmit'); if(btn){ btn.disabled=true; btn.textContent='AIがあなたに合うコーチを選定中…'; }
  if(SERVER && USER){
    try{ var r=await fetch('/api/onboarding',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({axisScores:ax,answeredCount:ans})}); var j=await r.json();
      if(r.ok){ state.onboarding={persona:j.persona,topAxes:j.topAxes,answeredCount:ans}; state.assignedCoach=j.coach; setPersonalityFromAxes(j.topAxes||Object.keys(ax).sort(function(a,b){return ax[b]-ax[a];})); saveData(); state.view='onboardingResult'; render(); return; } }
    catch(e){}
    toast('保存に失敗しました'); if(btn){ btn.disabled=false; btn.textContent='診断を完了する'; }
  } else {
    // タスク1: 営業タイプ × コーチのキャラでAIマッチング（スタンドアロン）
    var AFF={ c2:['compete','challenge','selfdrive'], c1:['empathy','relation','approval'], c3:['approval','reward','selfdrive'], c4:['growth','purpose','stability'] };
    var best=COACHES[0], bs=-1, bestScore=70;
    COACHES.forEach(function(c){ var s=0; (AFF[c.id]||[]).forEach(function(a){ s+=(ax[a]||0); }); if(s>bs){ bs=s; best=c; bestScore=Math.min(98,72+Math.round(s/20)); } });
    var top=Object.keys(ax).sort(function(a,b){return ax[b]-ax[a];}).slice(0,3);
    var ja={compete:'勝ち負け',approval:'承認',growth:'成長',reward:'報酬・地位',relation:'チーム',purpose:'意義',stability:'継続',empathy:'対話・共感',challenge:'挑戦',selfdrive:'自分軸'};
    state.onboarding={persona:top.map(function(a){return ja[a]||a;}).join('・')+'タイプ',topAxes:top,answeredCount:ans,matchScore:bestScore};
    state.assignedCoach={id:best.id,name:best.name,emoji:best.emoji,title:best.title,reason:best.strength+'点が好相性'};
    setPersonalityFromAxes(top); saveData();
    state.view='onboardingResult'; render();
  }
}

/* ---------- 起動：サーバーモード判定 ---------- */
(async function boot(){
  try{
    var r=await fetch('/api/me');
    if(r.status===200){ SERVER=true; var j=await r.json(); USER=j.user; AI_ENABLED=!!j.aiEnabled; await afterLogin(); return; }
    if(r.status===401){ SERVER=true; AI_ENABLED=false; render(); showLogin(); return; }
  }catch(e){ /* ファイル直開き等 → スタンドアロン */ }
  // スタンドアロン（ブラウザキー）モード
  loadData(); renderCfgState(); render();
})();
</script>
