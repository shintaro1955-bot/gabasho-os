<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ガバショ！ AIコーチングOS（プロトタイプ）</title>
<style>
  :root{
    --ink:#13241c; --ink-2:#3f5249; --mut:#8a988f; --line:#e4ede8;
    --bg:#ffffff; --bg-soft:#f3faf6; --card:#ffffff;
    --em:#10b981; --em-deep:#059669; --em-dark:#047857; --em-soft:#e7f7ef; --em-tint:#f0faf5;
    --gold:#e0b14a; --gold-soft:#fbf3df; --pink:#ff6b97; --pink-soft:#ffeaf1; --blue:#4aa3ff; --blue-soft:#e8f3ff;
    --purple:#8b6ff0; --purple-soft:#efeafb;
    --warn:#e2603a; --warn-soft:#fdeee8; --bad:#d6334a;
    --radius:16px; --shadow:0 16px 40px -26px rgba(16,40,30,.4);
    --font:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg-soft);line-height:1.7;-webkit-font-smoothing:antialiased}
  button{font-family:inherit}

  .appbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .appbar-in{display:flex;align-items:center;gap:14px;height:62px;padding:0 20px;max-width:1340px;margin:0 auto}
  .cobrand{display:flex;align-items:center;gap:8px;font-weight:900;text-decoration:none;color:inherit;flex:0 0 auto}
  .cobrand .star{color:var(--em-deep)} .cobrand .horipro{font-size:14px}
  .cobrand .x{color:var(--mut);font-size:11px}
  .cobrand .abhap{font-size:12px;color:var(--ink-2);border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .cobrand .ga{margin-left:2px;font-size:15px;color:var(--em-deep)}
  .roleswitch{margin-left:auto;display:flex;background:var(--em-tint);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;flex-wrap:wrap}
  .roleswitch button{border:0;background:transparent;color:var(--ink-2);font-weight:800;font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .roleswitch button.on{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 8px 18px -10px rgba(5,150,105,.6)}
  .who{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--em),var(--em-deep));color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px}
  .who small{font-size:11px;color:var(--mut);display:block;line-height:1.2}
  .who b{font-size:13px}

  .shell{display:grid;grid-template-columns:232px 1fr;max-width:1340px;margin:0 auto;min-height:calc(100vh - 62px)}
  nav.side{border-right:1px solid var(--line);background:#fff;padding:18px 14px}
  .side .grp{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--mut);margin:14px 10px 6px}
  .side a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;text-decoration:none;color:var(--ink-2);font-weight:700;font-size:13.5px;cursor:pointer}
  .side a .ic{width:22px;text-align:center}
  .side a:hover{background:var(--em-tint)}
  .side a.on{background:var(--em-soft);color:var(--em-dark)}
  .side .badge{margin-left:auto;background:var(--pink);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}

  main{padding:26px 30px 70px;min-width:0}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .page-head h1{font-size:23px;font-weight:900;margin:0}
  .page-head p{margin:2px 0 0;color:var(--mut);font-size:13px}

  .btn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:11px;padding:10px 16px;font-weight:800;font-size:13.5px;cursor:pointer;text-decoration:none;transition:transform .12s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn-em{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 12px 24px -12px rgba(5,150,105,.55)}
  .btn-ghost{background:#fff;color:var(--em-dark);border:1.5px solid var(--em)}
  .btn-soft{background:var(--em-soft);color:var(--em-dark)}
  .btn-gold{background:linear-gradient(120deg,#eec96a,var(--gold));color:#5b440c}
  .btn-sm{padding:7px 12px;font-size:12px}
  .btn[disabled]{opacity:.5;cursor:default;transform:none}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px}
  .pill.em{background:var(--em-soft);color:var(--em-dark)} .pill.gold{background:var(--gold-soft);color:#8a6a14}
  .pill.pink{background:var(--pink-soft);color:#b53a63} .pill.blue{background:var(--blue-soft);color:#2a6fb5}
  .pill.warn{background:var(--warn-soft);color:#a8401f} .pill.purple{background:var(--purple-soft);color:#5a45b0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .muted{color:var(--mut)} .sample{font-size:10px;color:var(--mut);background:#fff;border:1px dashed var(--line);border-radius:6px;padding:1px 6px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .threecol{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:17px;margin-bottom:8px;background:var(--em-soft)}
  .kpi .n{font-size:26px;font-weight:900;line-height:1} .kpi .l{font-size:11.5px;color:var(--mut);margin-top:3px}
  .kpi.g .ic{background:var(--gold-soft)} .kpi.p .ic{background:var(--pink-soft)} .kpi.b .ic{background:var(--blue-soft)}

  .follow{background:linear-gradient(120deg,#fff,var(--warn-soft));border:1px solid #f3d6c9;border-radius:var(--radius);padding:20px;margin-bottom:18px}
  .follow h2{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:8px}
  .follow .row,.listrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed #f0d8cd}
  .follow .row:last-child{border-bottom:0}
  .av-c{width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-weight:900;color:var(--em-dark);flex:0 0 auto}
  .nm{font-weight:800;font-size:13.5px} .reason{font-size:12px;color:var(--warn);font-weight:700}
  .row .act,.listrow .act{margin-left:auto;display:flex;gap:8px}

  .tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .tbl th{text-align:left;font-size:11px;color:var(--mut);font-weight:800;padding:12px 14px;background:var(--em-tint);border-bottom:1px solid var(--line)}
  .tbl td{padding:12px 14px;border-bottom:1px solid var(--line)} .tbl tr:last-child td{border-bottom:0}
  .tbl tr.clickable{cursor:pointer} .tbl tr.clickable:hover td{background:var(--em-tint)}
  .nmcell{display:flex;align-items:center;gap:10px}
  .nmcell .av{width:30px;height:30px;border-radius:50%;background:var(--em-soft);color:var(--em-dark);display:grid;place-items:center;font-weight:900;font-size:12px}
  .trend-up{color:var(--em-deep);font-weight:800} .trend-down{color:var(--bad);font-weight:800} .trend-flat{color:var(--mut);font-weight:800}

  .mood-row{display:flex;align-items:center;gap:12px;padding:9px 0}
  .mood-row .lab{width:120px;font-size:13px;font-weight:700;flex:0 0 auto}
  .emoji-pick{display:flex;gap:6px}
  .emoji-pick button{border:1.5px solid var(--line);background:#fff;border-radius:11px;width:42px;height:40px;font-size:19px;cursor:pointer;line-height:1;transition:all .12s ease}
  .emoji-pick button.on{border-color:var(--em);background:var(--em-soft);transform:translateY(-2px)}
  .field{margin-bottom:14px} .field label{display:block;font-size:12.5px;font-weight:800;margin-bottom:5px}
  textarea,input.txt{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:13.5px;resize:vertical}
  textarea:focus,input.txt:focus{outline:0;border-color:var(--em);box-shadow:0 0 0 4px rgba(16,185,129,.12)}

  .ai{background:linear-gradient(135deg,var(--em-tint),#fff);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .ai .tag{display:inline-flex;align-items:center;gap:7px;font-weight:900;font-size:13px;color:var(--em-dark);margin-bottom:10px}
  .ai .tag .dot{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--em),var(--em-deep));color:#fff;display:grid;place-items:center;font-size:13px}
  .ai .blk{margin:10px 0} .ai .blk b{display:block;font-size:11.5px;color:var(--mut);font-weight:800;margin-bottom:1px} .ai .blk p{margin:0;font-size:13.5px}
  .ai .next{background:#fff;border:1px dashed var(--em);border-radius:11px;padding:12px 14px;margin-top:8px}

  .score-big{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .ring{--p:76;width:120px;height:120px;border-radius:50%;flex:0 0 auto;background:conic-gradient(var(--em) calc(var(--p)*1%), var(--em-soft) 0);display:grid;place-items:center}
  .ring .in{width:92px;height:92px;border-radius:50%;background:#fff;display:grid;place-items:center}
  .ring .in b{font-size:30px;font-weight:900;line-height:1} .ring .in small{font-size:10px;color:var(--mut)}
  .bars{display:grid;gap:9px;flex:1;min-width:200px}
  .bar{display:grid;grid-template-columns:104px 1fr 34px;align-items:center;gap:10px;font-size:12px}
  .bar .track{height:9px;background:var(--em-soft);border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--em),var(--em-deep));border-radius:6px}

  .spark{width:100%;height:74px}
  .spark polyline{fill:none;stroke:var(--em-deep);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .spark .area{fill:rgba(16,185,129,.12);stroke:none} .spark circle{fill:#fff;stroke:var(--em-deep);stroke-width:2}

  .ptype{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,var(--em-soft),#fff);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .ptype .em{font-size:36px} .ptype b{font-size:18px} .ptype small{color:var(--mut);font-size:12px}
  .deflist{display:grid;gap:10px}
  .deflist .it b{display:block;font-size:11.5px;color:var(--em-dark);font-weight:800} .deflist .it span{font-size:13px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{background:var(--em-soft);color:var(--em-dark);font-size:12px;font-weight:700;border-radius:999px;padding:4px 11px}
  .chip.w{background:var(--gold-soft);color:#8a6a14} .chip.r{background:var(--warn-soft);color:#a8401f}

  .privacy{display:flex;gap:10px;align-items:flex-start;background:var(--blue-soft);border:1px solid #cfe5fb;border-radius:12px;padding:12px 14px;font-size:12px;color:#2a5f93}

  /* 継続：カレンダー / ミッション / 目標 / バッジ */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .d{aspect-ratio:1/1;border-radius:9px;display:grid;place-items:center;font-size:11px;font-weight:800;border:1px solid var(--line);color:var(--mut);background:#fff}
  .cal .d.done{background:linear-gradient(135deg,var(--em),var(--em-deep));color:#fff;border-color:transparent}
  .cal .d.today{outline:2px solid var(--gold);outline-offset:1px}
  .mission .item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .mission .item:last-child{border-bottom:0}
  .mission .ck{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:14px;transition:all .15s ease}
  .mission .item.on .ck{background:linear-gradient(135deg,var(--em),var(--em-deep));border-color:transparent}
  .mission .item.on .t{color:var(--mut);text-decoration:line-through}
  .progress{height:10px;background:var(--em-soft);border-radius:6px;overflow:hidden}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--em),var(--em-deep));border-radius:6px;transition:width .4s ease}
  .goal{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px dashed var(--line)}
  .goal:last-child{border-bottom:0}
  .goal .em{font-size:24px;flex:0 0 auto}
  .goal .meta{flex:1;min-width:0}
  .goal .meta b{font-size:14px} .goal .meta .gp{font-size:11.5px;color:var(--mut)}
  .goal .pbar{height:8px;background:var(--em-soft);border-radius:6px;overflow:hidden;margin-top:5px}
  .goal .pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e0a82e);border-radius:6px}
  .badges{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .bm{text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 8px}
  .bm.locked{opacity:.45;filter:grayscale(.6)}
  .bm .e{font-size:30px} .bm b{display:block;font-size:12px;margin-top:4px} .bm small{font-size:10.5px;color:var(--mut)}

  /* 動画BOX */
  .vbox{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .vcard{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:transform .15s ease}
  .vcard:hover{transform:translateY(-3px)}
  .vcard .thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#0f1830,#16224a);display:grid;place-items:center;position:relative}
  .vcard .thumb .play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:var(--em-deep);font-size:20px}
  .vcard .thumb .unread{position:absolute;top:10px;left:10px;background:var(--pink);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:2px 9px}
  .vcard .thumb .gold{position:absolute;top:10px;right:10px;font-size:18px}
  .vcard .vb{padding:12px 14px} .vcard .vb b{font-size:13.5px} .vcard .vb small{color:var(--mut);font-size:11.5px;display:block}

  /* coach brief / script */
  .brief{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
  .scriptbox{background:#0f1830;color:#e7eefc;border-radius:14px;padding:18px 20px}
  .scriptbox h4{margin:0 0 4px;font-size:11.5px;letter-spacing:.06em;color:#8fb7ff} .scriptbox p{margin:0 0 14px;font-size:13.5px;line-height:1.7}
  .scriptbox .last p{margin-bottom:0}

  /* prompts editor */
  .promptcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .promptcard h4{margin:0 0 8px;font-size:13px}
  .promptcard textarea{min-height:120px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6;background:#fbfdfb}

  /* ranking / alert */
  .rank .listrow{border-bottom-style:solid;border-color:var(--line)}
  .rank .pos{width:30px;font-weight:900;font-size:16px;text-align:center;flex:0 0 auto}
  .rank .pos.p1{color:#d9a514} .rank .pos.p2{color:#9aa3ab} .rank .pos.p3{color:#c08457}
  .alert .listrow{border-color:#f0d8cd}
  .risk{font-weight:900;border-radius:8px;padding:2px 10px;font-size:12px}
  .risk.hi{background:var(--warn-soft);color:#a8401f} .risk.mid{background:var(--gold-soft);color:#8a6a14} .risk.lo{background:var(--em-soft);color:var(--em-dark)}

  /* toast / modal */
  .cfgbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;color:var(--ink-2);cursor:pointer}
  .cfgbtn #cfgDot{color:var(--mut);font-size:9px}
  .cfgbtn.live{border-color:var(--em);color:var(--em-dark);background:var(--em-tint)}
  .cfgbtn.live #cfgDot{color:var(--em)}
  .modal-card .field{margin-bottom:14px}
  .modal-card .field label{font-size:12px;font-weight:800;display:block;margin-bottom:5px}
  .modal-card .field input,.modal-card .field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13.5px;background:#fff}
  .modal-card .chk{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--ink-2)}
  .modal-card .chk input{width:17px;height:17px;margin-top:3px;flex:0 0 auto}
  /* 応援コーチ + 成長スコア hero */
  .hero-strip{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-bottom:16px}
  .coach-card{background:linear-gradient(120deg,#0f1830,#16224a);color:#fff;border-radius:18px;padding:18px 20px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden}
  .coach-card .glow{position:absolute;inset:auto -20% -70% auto;width:55%;height:220%;background:radial-gradient(closest-side,rgba(224,177,74,.32),transparent)}
  .coach-card .av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#e7d4a0,#caa44e);display:grid;place-items:center;font-size:30px;flex:0 0 auto;border:2px solid rgba(255,255,255,.45);position:relative;z-index:1}
  .coach-card .cc-body{position:relative;z-index:1;flex:1;min-width:0}
  .coach-card .label{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--gold)}
  .coach-card .nm{font-size:16px;font-weight:900}
  .coach-card .ti{font-size:11.5px;opacity:.82}
  .coach-card .msg{font-size:13.5px;margin:7px 0 10px}
  .score-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 20px;display:flex;flex-direction:column;justify-content:center}
  .score-card .lab{font-size:11.5px;color:var(--mut);font-weight:800}
  .score-card .big{font-size:42px;font-weight:900;line-height:1;color:var(--em-deep)}
  .score-card .deltas{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
  .score-card .deltas b{color:var(--em-deep)}
  /* 動画BOX 3状態 */
  .vsum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;background:linear-gradient(120deg,var(--em-tint),#fff);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .vsum .s b{display:block;font-size:20px;font-weight:900;line-height:1.1} .vsum .s small{font-size:11px;color:var(--mut)}
  .vsec-h{font-weight:900;font-size:14px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .vcard.locked{cursor:default} .vcard.locked .thumb{filter:grayscale(1) brightness(.72)}
  .vcard .lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
  .vcard .lock .k{font-size:26px} .vcard .lock .rem{font-size:11.5px;font-weight:800;background:rgba(0,0,0,.5);padding:3px 11px;border-radius:999px;margin-top:6px}
  .vcard.prem{border:2px solid var(--gold)} .vcard.prem .thumb{background:linear-gradient(135deg,#1b2c52,#0d1b4c)}
  .vcard .trophy{position:absolute;top:10px;right:10px;font-size:20px}
  .vcard .prem-badge{position:absolute;top:10px;left:10px;background:linear-gradient(120deg,#e7d4a0,#caa44e);color:#3a2b08;font-size:9.5px;font-weight:900;border-radius:999px;padding:2px 9px}
  /* 管理者アラート */
  .alertrow{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed var(--line)}
  .alertrow:last-child{border-bottom:0}
  .lv{font-size:10px;font-weight:900;border-radius:6px;padding:3px 9px;flex:0 0 auto;margin-top:2px}
  .lv.high{background:var(--warn-soft);color:#a8401f} .lv.medium{background:var(--gold-soft);color:#8a6a14} .lv.low{background:var(--em-soft);color:var(--em-dark)}
  .alertrow .rec{background:var(--bg-soft);border-radius:10px;padding:8px 12px;font-size:12.5px;margin-top:6px}
  @media(max-width:900px){ .hero-strip{grid-template-columns:1fr} .vsum{grid-template-columns:1fr 1fr} }
  /* 応援メッセージ（スレッド） */
  .thread{display:flex;flex-direction:column;gap:10px;max-height:48vh;overflow:auto;padding:4px 2px}
  .bubble{max-width:76%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.65}
  .bubble .who{font-size:10.5px;font-weight:800;opacity:.7;margin-bottom:3px}
  .bubble.coach{align-self:flex-start;background:#fff;border:1px solid var(--line);border-top-left-radius:4px}

async function aiCall(kind, input, schema, system){
  if(SERVER && USER){

// 実LLM呼び出し（ブラウザ直叩き：PoC専用）。本番はサーバ関数経由に置換。
async function callClaude(system, userText, schema){
  var body={ model:cfg.model||'claude-opus-4-8', max_tokens:1024, system:system, messages:[{role:'user', content:userText}] };
  if(schema){ body.output_config={ format:{ type:'json_schema', schema:schema } }; }
  var res=await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':cfg.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify(body)
  });
  if(!res.ok){ var t=await res.text(); throw new Error('API '+res.status+'：'+t.slice(0,160)); }
  var data=await res.json();
  return (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
}

function sparkline(data,w,h){
  w=w||320;h=h||74;var max=Math.max.apply(null,data),min=Math.min.apply(null,data);var pad=8;
  var pts=data.map(function(v,i){var x=pad+i*((w-pad*2)/(data.length-1));var y=h-pad-((v-min)/((max-min)||1))*(h-pad*2);return [x,y];});
  var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var area='8,'+(h-pad)+' '+poly+' '+(w-pad)+','+(h-pad);var last=pts[pts.length-1];
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polygon class="area" points="'+area+'"/><polyline points="'+poly+'"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5"/></svg>';
}

    v.unit = v.reqScore ? '点' : '日'; return v;
  });
}
function nextReward(){ return rewardVideos().filter(function(v){return !v.isUnlocked && v.req!==999;}).sort(function(a,b){return a.remain-b.remain;})[0]; }
function growthScore(){
  var c=state.aiComment, sc=c?c.score:72;
  var bd=c?c.scoreBreakdown:{action:78,continuity:90,openness:74,communication:66,salesMind:70,condition:76};
  return { total:sc, dod:4, wow:12, items:[['継続力',bd.continuity],['行動力',bd.action],['自己理解',bd.openness],['メンタル安定',bd.condition],['目標達成力',bd.salesMind],['相談力',bd.communication]] };
}
function memberAlerts(){
  return MEMBERS.filter(function(m){return m.flags.length;}).map(function(m){
    var f=m.flags.join('');
    var type=f.indexOf('未提出')>=0?'no_input':(f.indexOf('低下')>=0?'high_fatigue':(f.indexOf('急落')>=0?'score_drop':'low_mood'));
    var rec=m.risk==='hi'?'明日までに上司から短い声かけを推奨。例：「最近どう？今どこが一番詰まってる？」'
           :m.coach?'コーチング予約を案内。例：「今週の勝ちポイントを一緒に確認しよう」'
           :'まず1つだけ終わらせる声かけを。例：「今日は1個だけ、一緒に片付けよう」';
    return { m:m, type:type, level:(m.risk==='hi'?'high':m.risk==='mid'?'medium':'low'), message:m.name+'さんは'+m.flags.join('・')+'。', rec:rec };
  });
}

var BRIEF_SCHEMA={ type:'object', properties:{
  summary:{type:'string'}, personality:{type:'string'},
  praise:{type:'array',items:{type:'string'}}, questions:{type:'array',items:{type:'string'}}, avoid:{type:'array',items:{type:'string'}},
  openingScript:{type:'string'}, closingMessage:{type:'string'}, push:{type:'string'}
}, required:['summary','personality','praise','questions','avoid','openingScript','closingMessage','push'], additionalProperties:false };
var BRIEF_SYSTEM='あなたはホリプロ所属の女子アナ・タレントが、若手営業マンを前向きにコーチングするための面談ガイドを作るAIです。担当者が相手を怖がらず安心して面談できるよう、相手の特徴・褒めるポイント・避けるべき言い方・質問例・冒頭の声かけ(openingScript)・最後の応援メッセージ(closingMessage)・背中を押す一言(push)を作成してください。注意：相手を決めつけない。医療的な診断をしない。否定・説教・詰める言葉を避ける。前向きで自然な会話に。必ず指定のJSON形式のみで返答してください。';
function coachCtx(u){ return 'ユーザー：'+u.name+'（'+u.position+'）\n会社：'+u.company+'\n直近の目標：'+u.goal+'\n参考タイプ：'+u.salesType+'\n気分推移(5段階)：'+u.mood.join(', ')+'\n成長スコア：'+u.score+'\n今の状態：'+u.state; }
function getBrief(u){ var g=state.coachBriefs[u.id]; if(g) return g;
  var b=aiBrief(u); b.openingScript=u.name+'さん、今日はよろしくお願いします。最近の日記を拝見すると、結果に対してかなり真剣に向き合っているのが伝わってきました。'; b.closingMessage=u.name+'さんの努力は、ちゃんと前に進んでいます。また次回、進捗を聞かせてください。'; return b; }
async function generateBrief(u){
  var o=await aiCall('brief', coachCtx(u), BRIEF_SCHEMA, BRIEF_SYSTEM);
  if(o){ if(!o.moodTrend) o.moodTrend=u.mood.map(function(v){return EMOJI5[v];}).join(' → '); return o; }
  return getBrief(u);
}

function toast(msg){ var t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tid); t._tid=setTimeout(function(){t.classList.remove('show');},2200); }
function celebrate(){
  var colors=['#10b981','#e0b14a','#ff6b97','#4aa3ff','#34d399'];
  for(var i=0;i<110;i++){(function(i){
    var c=document.createElement('div'); var size=6+Math.round(rand(i)*8);
    c.style.cssText='position:fixed;top:-20px;left:'+(rand(i*7)*100)+'vw;width:'+size+'px;height:'+(size*0.5)+'px;background:'+colors[i%colors.length]+';z-index:90;border-radius:2px;pointer-events:none;opacity:.95;transform:rotate('+(rand(i*3)*360)+'deg);transition:transform 2.6s linear, top 2.6s linear, opacity 2.6s ease';
    document.body.appendChild(c);
    requestAnimationFrame(function(){ c.style.top=(78+rand(i*5)*22)+'vh'; c.style.transform='translateX('+((rand(i*9)-0.5)*260)+'px) rotate('+(rand(i*11)*720)+'deg)'; c.style.opacity='0'; });
    setTimeout(function(){ c.remove(); },2700);
  })(i);}
}
function showVideoModal(v){
  v.status='viewed'; state._shareV=v;
  el('modalRoot').innerHTML='<div class="modal-ov" id="vidModal"><div class="modal-card">'
    + '<div class="mc-top">🎉 Special Message が届きました！</div>'
    + '<div class="mc-body">'
      + '<div class="mc-name">'+ME.name+'さん、'+v.reason+'おめでとうございます！</div>'
      + '<div class="player" data-replay="1"><span class="smp sample">デモ：動画はプレースホルダー</span><div class="play">▶</div><div class="ptag">'+v.talent+' からのお祝い動画</div></div>'
      + '<div class="mc-msg">'+v.script+'</div>'
      + '<div class="mc-badge">🏅 「'+v.badge+'」を獲得！</div>'
      + '<div class="mc-actions"><button class="btn btn-gold" id="snsShare">📣 SNSでシェア</button><button class="btn btn-soft" data-share="1">社内に共有</button><button class="btn btn-ghost" data-closemodal="1">閉じる</button></div>'
    + '</div></div></div>';
  celebrate();
}
function sendVideoToMember(id){
  var m=MEMBERS.filter(function(x){return x.id===id;})[0]; var name=m?m.name:'メンバー';
  toast('🎬 '+name+'さんへのお祝い動画の収録をホリプロへ依頼しました！'); celebrate();
}

/* ===================== イベント ===================== */
document.addEventListener('click', function(e){
  var t;
  // role switch
  t=e.target.closest('[data-role]');
  if(t && t.parentElement && t.parentElement.id==='roleswitch'){
    state.role=t.getAttribute('data-role'); state.view=DEFAULT_VIEW[state.role]; state.selectedMember=null;
    [].forEach.call(el('roleswitch').children,function(b){ b.classList.toggle('on', b.getAttribute('data-role')===state.role); });
    render(); return;
  }
  // nav / goto
  function goView(v){
    if(v==='ai' && SERVER && USER && USER.role==='member'){ loadMessages(); return true; }
    if(v==='messages' && SERVER && USER){ loadCoachMembers(); return true; }
    if(v==='leaders' && SERVER && USER){ loadMembersFor('leaders'); return true; }
    if(v==='profiles' && SERVER && USER){ loadMembersFor('profiles'); return true; }
    if(v==='league'){ loadLeague(); return true; }
    return false;
  }
  t=e.target.closest('[data-view]'); if(t){ var v=t.getAttribute('data-view'); if(goView(v)) return; state.view=v; render(); return; }
  t=e.target.closest('[data-goto]'); if(t){ var v2=t.getAttribute('data-goto'); if(goView(v2)) return; state.view=v2; render(); return; }
  // 応援メッセージ操作
  if(e.target.closest('#msgSend')){ sendReply(); return; }
  t=e.target.closest('[data-coachpick]'); if(t){ openCoachThread(t.getAttribute('data-coachpick')); return; }
  if(e.target.closest('#coachDraft')){ coachDraft(); return; }
  if(e.target.closest('#coachSendBtn')){ coachSend(); return; }
  // generic toast
  t=e.target.closest('[data-toast]'); if(t){ toast(t.getAttribute('data-toast')); return; }
  // coach user select
  t=e.target.closest('[data-coachuser]'); if(t){ state.coachUser=COACH_USERS.filter(function(u){return u.id===t.getAttribute('data-coachuser');})[0]; state.view='brief'; render(); return; }
  // member detail
  t=e.target.closest('[data-member]'); if(t){ state.selectedMember=MEMBERS.filter(function(m){return m.id===t.getAttribute('data-member');})[0]; state.view='memberDetail'; render(); return; }
  // arrange coaching
  t=e.target.closest('[data-arrange]'); if(t){ var mm=MEMBERS.filter(function(m){return m.id===t.getAttribute('data-arrange');})[0]; toast('「'+(mm?mm.name:'')+'」さんの面談をホリプロ側コーチへ手配しました（デモ）'); return; }
  // send video (admin/coach)
  t=e.target.closest('[data-sendvideo]'); if(t){ sendVideoToMember(t.getAttribute('data-sendvideo')); return; }
  // upload video (coach)
  if(e.target.closest('#uploadVideo')){ toast('動画をアップロードしました。対象ユーザーのBOXに届きます（デモ）'); celebrate(); return; }
  // play received video (user)
  t=e.target.closest('[data-playvideo]'); if(t){ var v=MY_VIDEOS.filter(function(x){return x.id===t.getAttribute('data-playvideo');})[0]; if(v) showVideoModal(v); return; }
  t=e.target.closest('[data-locktoast]'); if(t){ toast('🔒 '+t.getAttribute('data-locktoast')); return; }
  // modal controls
  if(e.target.closest('[data-replay]')){ celebrate(); return; }
  if(e.target.closest('[data-share]')){ toast('社内に共有しました（デモ）'); return; }
  if(e.target.closest('[data-closemodal]') || (e.target.id==='vidModal')){ el('modalRoot').innerHTML=''; if(state.role==='user'){ render(); } return; }

  // mood emoji
  t=e.target.closest('[data-mood]');
  if(t){ var key=t.getAttribute('data-mood'); state.mood[key]=parseInt(t.getAttribute('data-val'),10);
    [].forEach.call(t.parentElement.children,function(b){ b.classList.toggle('on', b===t); });
    saveData();
    return;
  }
  // AI設定モーダル
  if(e.target.closest('#cfgBtn')){ openCfg(); return; }
  if(e.target.closest('#notifyBtn')){ openNotify(); return; }
  if(e.target.closest('#lineLink')){ toggleLine(); return; }
  if(e.target.closest('#dealBtn')){ recordDeal(); return; }
  t=e.target.closest('[data-onb]'); if(t){ var qid=t.getAttribute('data-onb'); state.onbAnswers[qid]=parseInt(t.getAttribute('data-val'),10);
    [].forEach.call(t.parentElement.children,function(b){ b.classList.toggle('on', b===t); });
    var ans=onbAnswered(); var cc=el('onbCount'); if(cc) cc.textContent=ans+' / '+ONB_Q.length+' 回答'; var bar=el('onbBar'); if(bar) bar.style.width=Math.round(ans/ONB_Q.length*100)+'%'; return; }
  if(e.target.closest('#onbSubmit')){ submitOnboarding(); return; }
  if(e.target.closest('#postPres')){ postLeaderNote('president'); return; }
  if(e.target.closest('#postBoss')){ postLeaderNote('boss'); return; }
  if(e.target.closest('#snsShare')){ shareVideo(state._shareV); return; }
  if(e.target.closest('#shrCopy')){ var i=el('shrUrl'); if(i){ i.select(); try{ document.execCommand('copy'); }catch(e2){} toast('URLをコピーしました'); } return; }
  if(e.target.closest('[data-logout]')){ fetch('/api/logout',{method:'POST'}).then(function(){ location.reload(); }); return; }
  if(e.target.closest('#cfgSave')){
    var kv=el('cfgKey').value; if(kv && kv!=='********') cfg.apiKey=kv.trim();
    cfg.model=el('cfgModel').value; cfg.live=el('cfgLive').checked; if(!cfg.apiKey) cfg.live=false;
    saveCfg(); el('modalRoot').innerHTML=''; renderCfgState(); toast(cfg.live?'実LLMモードON（'+cfg.model+'）':'デモモード'); return;
  }
  // generate AI（実LLM or モック）
  if(e.target.closest('#genAI')){ var btn=e.target.closest('#genAI'); btn.disabled=true; btn.textContent=aiOn()?'🤖 Claude生成中…':'🤖 生成中…';
    generateAIComment().then(function(c){
      state.aiComment=c; saveData(); render();
      toast(aiOn()?'ガバショAI（実Claude）が返答しました 🌱':'ガバショAIがフィードバックを返しました 🌱');
      var card=el('main').querySelector('.ai'); if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
    }).catch(function(err){
      btn.disabled=false; btn.textContent='🤖 AIコメントを受け取る'; toast('AI生成に失敗：'+err.message);
    });
    return; }
  // パーソナリティ診断生成（B）
  if(e.target.closest('#genPersona')){ var pb=e.target.closest('#genPersona'); pb.disabled=true; pb.textContent='🤖 生成中…';
    generatePersonality().then(function(p){ state.personality=p; saveData(); render(); toast(aiOn()?'AI診断（実Claude）が完了 🧭':'診断を生成しました'); })
      .catch(function(err){ pb.disabled=false; pb.textContent='🤖 診断'; toast('診断生成に失敗：'+err.message); }); return; }
  // 面談前サマリー／ガイド生成（C）
  var gb=e.target.closest('[data-genbrief]');
  if(gb){ var uid=gb.getAttribute('data-genbrief'); var cu=COACH_USERS.filter(function(x){return x.id===uid;})[0]||state.coachUser; gb.disabled=true; gb.textContent='🤖 生成中…';
    generateBrief(cu).then(function(b){ state.coachBriefs[uid]=b; render(); toast(aiOn()?'面談ガイド（実Claude）を生成 🗒️':'面談ガイドを生成しました'); })
      .catch(function(err){ gb.disabled=false; gb.textContent='🤖 生成'; toast('面談ガイド生成に失敗：'+err.message); }); return; }
  // お祝い動画台本生成（D）
  if(e.target.closest('#genVideo')){ var vb=e.target.closest('#genVideo'); vb.disabled=true; vb.textContent='🤖 生成中…';
    generateVideoScript(state.coachUser).then(function(v){ state.videoScript=v; render(); toast(aiOn()?'動画台本（実Claude）を生成 🎞️':'動画台本を生成しました'); })
      .catch(function(err){ vb.disabled=false; vb.textContent='🤖 台本'; toast('台本生成に失敗：'+err.message); }); return; }
  // complete day
  if(e.target.closest('#completeDay')){ state.dayDone=true; ME.streak+=1; saveData(); toast('🔥 今日を完了！連続記録が '+ME.streak+'日 になりました'); celebrate(); render(); return; }
  // coaching request
  if(e.target.closest('#reqCoach')){ toast('コーチングを希望しました。担当コーチがAI分析を確認のうえご連絡します 💬'); return; }
  // goal +progress
  t=e.target.closest('[data-goalup]');
  if(t){ var g=GOALS.filter(function(x){return x.id===t.getAttribute('data-goalup');})[0];
    if(g && g.current<g.target){ g.current+=1;
      if(g.current>=g.target && !g.done){ g.done=true;
        // 目標達成 → お祝い動画を自動トリガー
        var nv={id:'vg_'+g.id, reason:g.title+' 達成', title:g.title+' 達成おめでとう！', talent:'ホリプロ公式コーチ', badge:g.title+' 達成バッジ', type:'achievement', status:'unread',
          script:ME.name+'さん、「'+g.title+'」の達成、本当におめでとうございます！毎日コツコツ続けてきた成果です。次の目標へ、一緒に進みましょう！'};
        MY_VIDEOS.unshift(nv); saveData(); render(); showVideoModal(nv); return;
      }
      saveData(); render(); toast('進捗を記録しました（'+g.current+'/'+g.target+' '+g.unit+'）');
    }
    return;
  }
});
document.addEventListener('input', function(e){
  var d=e.target.getAttribute&&e.target.getAttribute('data-diary'); if(d){ state.diary[d]=e.target.value; saveData(); return; }
  var v=e.target.getAttribute&&e.target.getAttribute('data-vision'); if(v){ state.vision[v]=e.target.value; saveData(); }
});

/* AI設定モーダル＆状態チップ */
function renderCfgState(){
  var b=el('cfgBtn'), s=el('cfgState'); if(!b||!s) return;
  s.textContent=cfg.live?'実LLM':'デモ'; b.classList.toggle('live', !!cfg.live);
}
function openCfg(){
  var models=[['claude-opus-4-8','（既定・高品質）'],['claude-sonnet-4-6','（バランス）'],['claude-haiku-4-5','（最安・高速）']];
  el('modalRoot').innerHTML='<div class="modal-ov" id="cfgModal"><div class="modal-card" style="max-width:480px">'
    + '<div class="mc-top" style="background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff">⚙️ 実証実験モード（実LLM接続）</div>'
    + '<div class="mc-body">'
      + '<p style="font-size:12.5px;color:var(--ink-2);margin:0 0 14px">AnthropicのAPIキーを入れて「実LLMで生成」をONにすると、AIコメントが<b>本物のClaude</b>で生成されます（サーバー不要）。</p>'
      + '<div class="field"><label>Anthropic APIキー</label><input id="cfgKey" type="password" placeholder="sk-ant-..." value="'+(cfg.apiKey?'********':'')+'" autocomplete="off"></div>'
      + '<div class="field"><label>モデル</label><select id="cfgModel">'+models.map(function(m){return '<option value="'+m[0]+'"'+(cfg.model===m[0]?' selected':'')+'>'+m[0]+' '+m[1]+'</option>';}).join('')+'</select></div>'
      + '<label class="chk"><input type="checkbox" id="cfgLive"'+(cfg.live?' checked':'')+'><span>実LLMで生成する（OFF＝デモのモック出力）</span></label>'
      + '<div class="privacy" style="margin:14px 0"><span>🔒</span><div>キーはこの端末のブラウザ(localStorage)にのみ保存され、Anthropicへ直接送信されます。<b>社外配布・本番では使わず</b>、サーバー関数(/api)経由に切り替えてください。</div></div>'
      + '<div class="mc-actions"><button class="btn btn-em" id="cfgSave">保存</button><button class="btn btn-ghost" data-closemodal="1">閉じる</button></div>'
    + '</div></div></div>';
}

/* ---------- ログイン（サーバーモード） ---------- */
function showLogin(err){
  el('modalRoot').innerHTML='<div class="modal-ov" id="loginModal"><div class="modal-card" style="max-width:420px">'
    + '<div class="mc-top" style="background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff">★ HORIPRO × A.B.HAP ガバショ！ ログイン</div>'
    + '<div class="mc-body">'
      + '<form id="loginForm">'
      + '<div class="field"><label>メールアドレス</label><input id="loginEmail" type="email" autocomplete="username" placeholder="demo@gabasho.local"></div>'
      + '<div class="field"><label>パスワード</label><input id="loginPw" type="password" autocomplete="current-password" placeholder="••••••••"></div>'
      + (err?'<div style="color:var(--bad);font-size:12.5px;font-weight:700;margin-bottom:10px">'+err+'</div>':'')
      + '<div class="mc-actions" style="justify-content:flex-start"><button class="btn btn-em" type="submit" id="loginBtn">ログイン</button></div>'
      + '</form>'
      + '<p class="muted" style="font-size:11.5px;margin:14px 0 0">実証実験用アカウント（初回起動でサーバーが発行）：demo@ / admin@ / coach@ / ops@ ＠gabasho.local</p>'
    + '</div></div></div>';
  var f=el('loginForm'); if(f) f.addEventListener('submit', doLogin);
}
async function doLogin(e){
  if(e) e.preventDefault();
  var btn=el('loginBtn'); if(btn){ btn.disabled=true; btn.textContent='確認中…'; }
  try{
    var r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:el('loginEmail').value,password:el('loginPw').value})});
    var j=await r.json();
    if(!r.ok){ showLogin(j.error||'ログインに失敗しました'); return; }
    USER=j.user; await afterLogin();
  }catch(err){ showLogin('通信エラー：'+err.message); }
}
function roleOf(u){ return u.role==='member'?'user':u.role; }
async function afterLogin(){
  el('modalRoot').innerHTML='';
  state.role=roleOf(USER); state.view=DEFAULT_VIEW[state.role];
  var rs=el('roleswitch'); if(rs) rs.style.display='none';      // ロールはアカウントで固定
  var cb=el('cfgBtn'); if(cb) cb.style.display='none';          // キーはサーバー側
  await serverLoad();
  // ① 初回ログインは100問オンボーディングをファーストページに
  if(USER.role==='member' && !state.onboarding){ state.view='onboarding'; }
  render();
}

/* ① オンボーディング送信 → ペルソナ判定 → 女子アナ自動アサイン */
async function submitOnboarding(){
  var ax=onbAxisScores(); var ans=onbAnswered();
  if(ans<10){ toast('もう少し回答してください（10問以上）'); return; }
  var btn=el('onbSubmit'); if(btn){ btn.disabled=true; btn.textContent='AIがあなたに合うコーチを選定中…'; }
  if(SERVER && USER){
    try{ var r=await fetch('/api/onboarding',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({axisScores:ax,answeredCount:ans})}); var j=await r.json();
      if(r.ok){ state.onboarding={persona:j.persona,topAxes:j.topAxes,answeredCount:ans}; state.assignedCoach=j.coach; state.view='onboardingResult'; render(); return; } }
    catch(e){}
    toast('保存に失敗しました'); if(btn){ btn.disabled=false; btn.textContent='診断を完了する'; }
  } else {
    // スタンドアロン簡易マッチング
    var ROST=[{name:'元プロ野球選手 A',emoji:'⚾',aff:['compete','challenge','selfdrive']},{name:'三上 あかり（女子アナ）',emoji:'🎙️',aff:['empathy','approval','relation']},{name:'モデル D',emoji:'💫',aff:['approval','reward','selfdrive']},{name:'アナウンサー E',emoji:'📣',aff:['growth','purpose','empathy']}];
    var best=ROST[0],bs=-1; ROST.forEach(function(c){ var s=0; c.aff.forEach(function(a){s+=(ax[a]||0);}); if(s>bs){bs=s;best=c;} });
    var top=Object.keys(ax).sort(function(a,b){return ax[b]-ax[a];}).slice(0,3);
    var ja={compete:'勝ち負け',approval:'承認',growth:'成長',reward:'報酬・地位',relation:'チーム',purpose:'意義',stability:'継続',empathy:'対話・共感',challenge:'挑戦',selfdrive:'自分軸'};
    state.onboarding={persona:top.map(function(a){return ja[a]||a;}).join('・')+'タイプ',topAxes:top,answeredCount:ans};
    state.assignedCoach={name:best.name,emoji:best.emoji,title:'',reason:'あなたのペルソナに最適'};
    state.view='onboardingResult'; render();
  }
}

/* ---------- 起動：サーバーモード判定 ---------- */
(async function boot(){
  try{
    var r=await fetch('/api/me');
    if(r.status===200){ SERVER=true; var j=await r.json(); USER=j.user; AI_ENABLED=!!j.aiEnabled; await afterLogin(); return; }
    if(r.status===401){ SERVER=true; AI_ENABLED=false; render(); showLogin(); return; }
  }catch(e){ /* ファイル直開き等 → スタンドアロン */ }
  // スタンドアロン（ブラウザキー）モード
  loadData(); renderCfgState(); render();
})();
</script>
