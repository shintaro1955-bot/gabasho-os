<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ガバショ！ AIコーチングOS（プロトタイプ）</title>
<style>
  /* Standard Theme（白×ピンク・女性アナ/モデル伴走） */
  :root{
    --ink:#222222; --ink-2:#555b66; --mut:#7b8290; --line:#F3DDE5;
    --bg:#ffffff; --bg-soft:#FFFAFC; --card:#ffffff;
    --em:#F5427A; --em-deep:#E1306C; --em-dark:#C71E5B; --em-soft:#FFE6EE; --em-tint:#FFF1F5;
    --gold:#B68A2A; --gold-soft:#F5EBCD; --pink:#FF7A9C; --pink-soft:#FFE6EE; --blue:#4aa3ff; --blue-soft:#e8f3ff;
    --navy:#0D1B4C; --navy-dark:#07112F;
    --purple:#8b6ff0; --purple-soft:#efeafb;
    --warn:#e2603a; --warn-soft:#fdeee8; --bad:#d6334a;
    --radius:18px; --shadow:0 18px 44px -26px rgba(245,66,122,.28);
    --font:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  /* PRO Athlete Theme（ネイビー×ゴールド・管理者/上位プラン） */
  body.theme-pro{
    --ink:#111827; --ink-2:#4b5563; --mut:#6B7280; --line:#E5E7EB;
    --bg-soft:#F7F8FB;
    --em:#B68A2A; --em-deep:#9A7423; --em-dark:#7a5c1c; --em-soft:#F4E8C6; --em-tint:#FAF4E4;
    --shadow:0 18px 44px -26px rgba(13,27,76,.32);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg-soft);line-height:1.7;-webkit-font-smoothing:antialiased}
  /* PRO: ヘッダーをネイビーに */
  body.theme-pro .appbar{background:linear-gradient(120deg,var(--navy),var(--navy-dark))}
  body.theme-pro .appbar .cobrand .horipro,body.theme-pro .appbar .cobrand .ga,body.theme-pro .who b{color:#fff}
  body.theme-pro .appbar .cobrand .star,body.theme-pro .appbar .cobrand .ga{color:var(--gold)}
  body.theme-pro .appbar .cobrand .abhap{color:#fff;border-color:rgba(255,255,255,.4)}
  body.theme-pro .who small{color:var(--gold-soft)}
  body.theme-pro .appbar .cfgbtn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}
  button{font-family:inherit}

  .appbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .appbar-in{display:flex;align-items:center;gap:14px;height:62px;padding:0 20px;max-width:1340px;margin:0 auto}
  .cobrand{display:flex;align-items:center;gap:8px;font-weight:900;text-decoration:none;color:inherit;flex:0 0 auto}
  .cobrand .star{color:var(--em-deep)} .cobrand .horipro{font-size:14px}
  .cobrand .x{color:var(--mut);font-size:11px}
  .cobrand .abhap{font-size:12px;color:var(--ink-2);border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .cobrand .ga{margin-left:2px;font-size:15px;color:var(--em-deep)}
  .roleswitch{margin-left:auto;display:flex;background:var(--em-tint);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;flex-wrap:wrap}
  .roleswitch button{border:0;background:transparent;color:var(--ink-2);font-weight:800;font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .roleswitch button.on{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 8px 18px -10px rgba(5,150,105,.6)}
  .who{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--em),var(--em-deep));color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px}
  .who small{font-size:11px;color:var(--mut);display:block;line-height:1.2}
  .who b{font-size:13px}

  .shell{display:grid;grid-template-columns:232px 1fr;max-width:1340px;margin:0 auto;min-height:calc(100vh - 62px)}
  nav.side{border-right:1px solid var(--line);background:#fff;padding:18px 14px}
  .side .grp{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--mut);margin:14px 10px 6px}
  .side a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;text-decoration:none;color:var(--ink-2);font-weight:700;font-size:13.5px;cursor:pointer}
  .side a .ic{width:20px;height:20px;display:grid;place-items:center;color:var(--mut)}
  .side a:hover{background:var(--em-tint);color:var(--ink)}
  .side a.on{background:var(--em-soft);color:var(--em-dark)}
  .side a.on .ic{color:var(--em)}
  .side .badge{margin-left:auto;background:var(--em);color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px}
  /* 統一ラインアイコン */
  .ic-svg{width:18px;height:18px;display:inline-block;vertical-align:-3px;flex:0 0 auto}
  .side a .ic .ic-svg{width:19px;height:19px}

  main{padding:26px 30px 70px;min-width:0}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .page-head h1{font-size:24px;font-weight:900;margin:0;letter-spacing:-.01em}
  .page-head p{margin:2px 0 0;color:var(--mut);font-size:13px}

  .btn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:11px;padding:10px 16px;font-weight:800;font-size:13.5px;cursor:pointer;text-decoration:none;transition:transform .12s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn-em{background:linear-gradient(120deg,var(--em),var(--em-deep));color:#fff;box-shadow:0 12px 24px -12px rgba(5,150,105,.55)}
  .btn-ghost{background:#fff;color:var(--em-dark);border:1.5px solid var(--em)}
  .btn-soft{background:var(--em-soft);color:var(--em-dark)}
  .btn-gold{background:linear-gradient(120deg,#eec96a,var(--gold));color:#5b440c}
  .btn-sm{padding:7px 12px;font-size:12px}
  .btn[disabled]{opacity:.5;cursor:default;transform:none}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px}
  .pill.em{background:var(--em-soft);color:var(--em-dark)} .pill.gold{background:var(--gold-soft);color:#8a6a14}
  .pill.pink{background:var(--pink-soft);color:#b53a63} .pill.blue{background:var(--blue-soft);color:#2a6fb5}
  .pill.warn{background:var(--warn-soft);color:#a8401f} .pill.purple{background:var(--purple-soft);color:#5a45b0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 1px 2px rgba(17,24,39,.03),0 12px 30px -24px rgba(17,24,39,.18)}
  .sec-h{font-size:12px;font-weight:800;letter-spacing:.04em;color:var(--ink-2);display:flex;align-items:center;gap:8px;margin:0 0 14px}
  .sec-h .ic-svg{width:16px;height:16px;color:var(--em)}
  .kpi-ic-lg{width:46px;height:46px;border-radius:12px;background:var(--em-soft);color:var(--em-deep);display:grid;place-items:center;flex:0 0 auto}
  .kpi-ic-lg .ic-svg{width:24px;height:24px}
  .reason .ic-svg{width:14px;height:14px;vertical-align:-2px;margin-right:4px}
  /* タスク7: プロンプターモード */
  .prompter{position:fixed;inset:0;z-index:200;background:#1a1a2e;color:#fff;display:flex;flex-direction:column}
  .prompter .pr-close{position:absolute;top:16px;right:16px;z-index:2;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:15px;font-weight:800;border-radius:999px;padding:9px 16px;cursor:pointer}
  .prompter .pr-scroll{overflow-y:auto;padding:64px 7vw 80px;max-width:1000px;margin:0 auto;width:100%}
  .prompter .pr-who{color:#E0B14A;font-size:14px;font-weight:800;letter-spacing:.08em;margin-bottom:24px}
  .prompter .pr-sec{margin-bottom:30px}
  .prompter .pr-h{font-size:13px;color:#9aa3c7;font-weight:800;letter-spacing:.04em;margin-bottom:8px}
  .prompter .pr-b{font-size:24px;line-height:1.65;font-weight:600}
  @media(max-width:560px){ .prompter .pr-b{font-size:21px} .prompter .pr-scroll{padding:60px 6vw 70px} }
  /* タスク8: フィルタ用セレクト */
  .fsel{border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;font-family:inherit;background:#fff;color:var(--ink);min-width:150px;cursor:pointer}
  .fsel:focus{outline:none;border-color:var(--em)}
  /* タスク1/3: SNSシェアボタン */
  .vcard-outer{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(17,24,39,.03)}
  .vcard-outer .vcard{border:0;border-radius:0;box-shadow:none}
  .vcard-outer .share-row{border-top:1px solid var(--line)}
  .share-row{display:flex;gap:7px;flex-wrap:wrap;padding:10px 14px 14px}
  .share-btn{flex:1 1 auto;min-width:0;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .12s ease;font-family:inherit}
  .share-btn:hover{transform:translateY(-1px);border-color:var(--em)}
  .share-btn .ic-svg{width:15px;height:15px}
  .share-btn.x{background:#15171a;color:#fff;border-color:#15171a}
  .share-btn.ig{background:linear-gradient(120deg,#ff6b9d,#ff8c42);color:#fff;border:0}
  .share-btn.copied{background:var(--em-soft);color:var(--em-dark);border-color:var(--em)}
  .btn-x{background:#15171a;color:#fff}
  /* タスク2: 達成カード（ゴールド系） */
  .ach-card{width:min(92vw,420px);background:linear-gradient(150deg,#f6d365,#fda085);border-radius:22px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(0,0,0,.5)}
  .ach-top{padding:30px 24px 16px;text-align:center;color:#fff}
  .ach-top .ic-svg{width:54px;height:54px;color:#fff;filter:drop-shadow(0 4px 10px rgba(0,0,0,.18))}
  .ach-top span{display:block;font-size:26px;font-weight:900;margin-top:8px;text-shadow:0 2px 8px rgba(0,0,0,.15)}
  .ach-body{background:#fff;margin:0 14px 14px;border-radius:16px;padding:22px 20px;text-align:center}
  .ach-main{font-size:20px;font-weight:900;color:#b06a16;margin-bottom:16px}
  .ach-badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  .ach-b{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:#8a6a14;font-weight:800;font-size:12.5px;border-radius:999px;padding:7px 13px}
  .ach-b .ic-svg{width:15px;height:15px}
  .ach-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  /* タスク3: コーチ発信セクション */
  .coachpost textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:13.5px;font-family:inherit;color:var(--ink);line-height:1.7;resize:vertical;background:var(--em-tint)}
  /* タスク4: 実績サマリーカード */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sum-card{background:#fff;border:1px solid var(--line);border-left:4px solid #1a1a5e;border-radius:14px;padding:18px 20px}
  .sum-card .n{font-size:32px;font-weight:900;color:#1a1a5e;line-height:1.05;letter-spacing:-.01em}
  .sum-card .l{font-size:12px;color:var(--mut);margin-top:5px;font-weight:600}
  .sum-card .d{font-size:11px;font-weight:800;color:var(--gold);margin-top:6px}
  @media(max-width:680px){ .summary-grid{grid-template-columns:1fr} }
  /* タスク5: ログイン著名コーチスライダー */
  .coach-slider{position:relative;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;margin-bottom:18px;min-height:148px}
  .coach-slider .slides{display:flex;transition:transform .5s ease}
  .coach-slider .slide{min-width:100%;box-sizing:border-box;padding:22px 22px 20px;position:relative}
  .coach-slider .soon{position:absolute;top:12px;right:12px;background:#f6d365;color:#1a1a2e;font-size:10px;font-weight:900;border-radius:999px;padding:4px 10px;letter-spacing:.03em}
  .coach-slider .s-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#e7d4a0,#caa44e);color:#2a2008;display:grid;place-items:center;font-weight:900;font-size:20px;margin-bottom:12px}
  .coach-slider .s-role{font-size:11px;font-weight:800;letter-spacing:.08em;color:#f6d365}
  .coach-slider .s-name{font-size:19px;font-weight:900;margin:3px 0 6px}
  .coach-slider .s-msg{font-size:12.5px;color:#c7cee4;line-height:1.6}
  .coach-slider .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:6px;justify-content:center}
  .coach-slider .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s}
  .coach-slider .dots i.on{background:#f6d365;width:18px;border-radius:999px}
  /* AIの顔＝アナウンサーアイコン */
  .psil{width:66%;height:66%;color:#fff;opacity:.92;display:block;margin:auto}
  .coach-card .av .psil{color:#3a2b08;opacity:.82}
  .side-self .av .psil{color:#3a2b08;opacity:.85}
  .aiface{display:inline-grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,#ff9ab8,#f5427a);color:#fff;flex:0 0 auto;box-shadow:0 6px 14px -8px rgba(245,66,122,.6)}
  .aiface .ic-svg{width:60%;height:60%}
  body.theme-pro .aiface{background:linear-gradient(135deg,#e7d4a0,#b68a2a);color:#3a2b08}
  .ai .ai-head{display:flex;align-items:center;gap:11px}
  .ai .ai-name{font-size:14px;font-weight:900}
  .ai .ai-sub{font-size:11.5px;color:var(--mut);font-weight:700}
  /* タスク1: 相性診断 */
  .match-hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:linear-gradient(120deg,var(--em-tint),var(--card));border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .match-ring{width:92px;height:92px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:conic-gradient(var(--em) calc(var(--m)*1%), var(--em-soft) 0);position:relative}
  .match-ring::after{content:'';position:absolute;inset:8px;background:var(--card);border-radius:50%}
  .match-ring b{position:relative;z-index:1;font-size:24px;font-weight:900;color:var(--em-dark)}
  .match-ring small{position:relative;z-index:1;font-size:9px;color:var(--mut);display:block;text-align:center;margin-top:-2px}
  .coach-row{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px dashed var(--line)}
  .coach-row:last-child{border-bottom:0}
  .coach-row .cav{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#ff9ab8,#f5427a);color:#fff;display:grid;place-items:center;font-weight:900;font-size:18px;flex:0 0 auto}
  .coach-row .cav .ic-svg{width:24px;height:24px}
  .coach-row .cm{flex:1;min-width:0}
  .coach-row .cm b{font-size:14px} .coach-row .cm .ct{font-size:11.5px;color:var(--mut)}
  .coach-row .cmatch{text-align:right;flex:0 0 auto}
  .coach-row .cmatch .pct{font-size:20px;font-weight:900;color:var(--em-deep)} .coach-row .cmatch .lb{font-size:10px;color:var(--mut)}
  .tier-badge{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;font-weight:900;font-size:14px}
  .tier-badge.gold{background:var(--gold-soft);color:#8a6a14} .tier-badge.em{background:var(--em-soft);color:var(--em-dark)} .tier-badge.blue{background:var(--blue-soft);color:#2a6fb5} .tier-badge.warn{background:var(--warn-soft);color:#a8401f}
  .cap-bar{height:7px;background:var(--em-tint);border-radius:999px;overflow:hidden;min-width:90px}
  .cap-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--em),var(--em-deep))}
  /* 女子アナ専属プランのヒアリング（選択式）＋プラン提案 */
  .hear-q{padding:14px 0;border-bottom:1px dashed var(--line)} .hear-q:last-of-type{border-bottom:0}
  .hear-q .qh{font-size:13.5px;font-weight:800;margin-bottom:9px;display:flex;gap:8px}
  .hear-q .qn{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--pink-soft);color:#b53a63;font-size:11px;font-weight:900;display:grid;place-items:center}
  .hear-opts{display:flex;flex-direction:column;gap:8px}
  .hear-opt{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:11px 13px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;color:var(--ink);font-family:inherit;transition:all .12s ease}
  .hear-opt:hover{border-color:var(--pink)}
  .hear-opt .rad{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center}
  .hear-opt.on{border-color:var(--pink);background:#fff0f5;color:#b53a63}
  .hear-opt.on .rad{border-color:var(--pink)} .hear-opt.on .rad::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--pink)}
  .hear-prog{height:7px;background:var(--pink-soft);border-radius:999px;overflow:hidden;margin:4px 0 2px}
  .hear-prog i{display:block;height:100%;background:linear-gradient(90deg,#ff9ab8,#f5427a)}
  .reco{background:linear-gradient(135deg,#ff6b9d,#ff8c42);color:#fff;border-radius:18px;padding:22px;margin-top:16px}
  .reco .rl{font-size:11px;font-weight:800;letter-spacing:.06em;opacity:.95}
  .reco .rn{font-size:23px;font-weight:900;margin:4px 0 2px}
  .reco .rp{font-size:15px;font-weight:800} .reco .rp small{font-size:11px;opacity:.9;font-weight:600}
  .reco .rt{font-size:12.5px;opacity:.96;margin:8px 0 0}
  .reco .runlock{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);border-radius:12px;padding:12px 14px;margin-top:14px}
  .reco .runlock b{font-size:11.5px;display:block;margin-bottom:6px}
  .reco .runlock .ul{display:flex;flex-direction:column;gap:6px}
  .reco .runlock .ul span{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;font-weight:600}
  .reco .runlock .ul span .ic-svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px}
  .reco .ract{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .btn-white{background:#fff;color:#b53a63;font-weight:800}
  .btn-line{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.7)}
  .plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
  .plan-card{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff;position:relative;display:flex;flex-direction:column}
  .plan-card.reco-on{border:2px solid var(--pink);box-shadow:0 14px 34px -22px rgba(245,66,122,.55)}
  .plan-card .pbadge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:linear-gradient(120deg,#ff6b9d,#ff8c42);color:#fff;font-size:9.5px;font-weight:900;border-radius:999px;padding:3px 11px;white-space:nowrap}
  .plan-card .pn{font-size:14px;font-weight:900} .plan-card .pp{font-size:18px;font-weight:900;margin:6px 0 0;color:var(--ink)} .plan-card .ps{font-size:10px;color:var(--mut)}
  .plan-card .pf{list-style:none;padding:0;margin:11px 0 0;display:flex;flex-direction:column;gap:7px}
  .plan-card .pf li{font-size:11.5px;color:var(--ink-2);display:flex;align-items:flex-start;gap:6px;font-weight:600}
  .plan-card .pf li .ic-svg{width:13px;height:13px;color:var(--em);flex:0 0 auto;margin-top:2px}
  .plan-card .pcta{margin-top:14px}
  @media(max-width:760px){ .plan-grid{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:80%;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:8px 0 6px} .plan-card{scroll-snap-align:center} }
  /* 法人プラン＆コーチ・マッチング */
  .tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  @media(max-width:980px){ .tier-grid{grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:62%;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px} }
  .tier{border:1px solid var(--line);border-radius:14px;padding:16px 14px;background:var(--card);position:relative;scroll-snap-align:center;display:flex;flex-direction:column}

  /* 頑張る理由（じぶん設定） */

  @media(max-width:640px){ .gbz .dream .dr-form{ grid-template-columns:1fr } }
  /* 初回セットアップ（頑張る理由） */
  .gbz .ds-hero{ background:linear-gradient(160deg,#F5427A,#E1306C); color:#fff; border-radius:24px; padding:30px 30px; margin-bottom:18px; box-shadow:0 24px 60px -30px rgba(225,48,108,.5) }
  .gbz .ds-eyebrow{ font-size:11px; font-weight:800; letter-spacing:.18em; color:#ffd0e0 }
  .gbz .ds-hero h1{ font-size:clamp(21px,3.2vw,27px); font-weight:900; margin:8px 0 0; line-height:1.4 }

  /* 全ページ共通・目標バー */
  .dreambar{ display:flex; align-items:center; gap:11px; background:linear-gradient(120deg,#FFF0F6,#FFF8FB); border:1px solid #F3DDE5; border-left:4px solid #F5427A; border-radius:14px; padding:10px 16px; margin:0 0 16px; cursor:pointer }

  .dreambar .db-main small{ font-size:11px; color:#a08a92; font-weight:700; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }

  body.theme-pro .dreambar{ background:linear-gradient(120deg,#FFFDF5,#fff); border-color:#ead9a8; border-left-color:var(--gold,#C9A227) }
  .gbz .hero .score{ margin:24px 0 0; text-align:center }
  .gbz .hero .score .lab{ font-size:11px; font-weight:800; letter-spacing:.22em; color:#ffd0e0 }
  .gbz .hero .score .n{ font-size:74px; font-weight:900; line-height:1; color:#fff; font-variant-numeric:tabular-nums; text-shadow:0 8px 34px rgba(255,255,255,.3) }

  .gbz .sec{ margin-top:22px }
  .gbz .sec-t{ font-size:13px; font-weight:900; color:var(--ink); margin:0 0 12px; letter-spacing:.02em }
  .gbz .card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px 18px }
  /* 今の自分を選ぶ：4アイコン */
  .gbz .choices{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px }
  .gbz .choice{ border:1.5px solid var(--line); background:var(--card); border-radius:16px; padding:16px 8px 12px; text-align:center; cursor:pointer; transition:all .16s ease }

  .gbz .choice .t{ font-size:12.5px; font-weight:800; color:var(--ink); margin-top:8px }
  /* MBTI風スペクトラム（5段階・中央から左右） */
  .gbz .axis{ padding:12px 2px; border-bottom:1px solid var(--line) }
  .gbz .axis:last-child{ border-bottom:0 }

  .gbz .track::after{ content:""; position:absolute; left:50%; top:50%; width:1px; height:12px; background:var(--line); transform:translate(-50%,-50%) }

  .gbz .dot.sel{ width:22px; height:22px; border-color:var(--ac); background:var(--ac); box-shadow:0 4px 12px -3px rgba(245,66,122,.5) }
  /* 短い入力 */
  .gbz .oneline{ width:100%; border:1.5px solid var(--line); border-radius:14px; padding:14px 16px; font-size:15px; font-weight:600; color:var(--ink); background:var(--card); font-family:inherit }
  .gbz .oneline:focus{ outline:0; border-color:var(--ac); box-shadow:0 0 0 4px rgba(245,66,122,.14) }
  .gbz .oneline::placeholder{ color:#94a3b8; font-weight:500 }
  /* 保存 */
  .gbz .save{ width:100%; margin-top:20px; border:0; border-radius:16px; padding:17px; font-size:16px; font-weight:900; color:#fff; cursor:pointer; background:linear-gradient(135deg,var(--ac),var(--ac2)); box-shadow:0 16px 34px -14px rgba(245,66,122,.5); transition:transform .14s ease }
  .gbz .save:hover{ transform:translateY(-2px) }
  .gbz .saved{ margin-top:14px; text-align:center; background:#FFF1F5; border:1px solid #FAD3E1; color:var(--ac2); border-radius:14px; padding:14px; font-weight:800; font-size:14.5px }

  /* ===== GABASHO SCORE 画面：ネイビー×グリーンのウェルビーイングSaaS（.gbs スコープ） ===== */
  .gbs{ --nv:#0B2545; --nv2:#14315a; --grn:#16C784; --grn2:#0ea968; --sub:#64748B; --bg:#F7FAFC; --card:#FFFFFF; --line:#E2E8F0; --grn-soft:#EFFFF8; --pink:#EC407A; --gold:#C9A227; --ink:#0B2545;
    max-width:980px; margin:0 auto; color:var(--ink) }
  .gbs *{box-sizing:border-box}
  .gbs .head{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:22px }
  .gbs .head .lab{ font-size:11px; font-weight:800; letter-spacing:.18em; color:var(--grn2) }
  .gbs .head h1{ font-size:clamp(23px,3.2vw,30px); font-weight:900; margin:8px 0 0; letter-spacing:.01em; line-height:1.32 }
  .gbs .head .sub{ font-size:13.5px; color:var(--sub); margin:8px 0 0; max-width:52ch; line-height:1.7 }
  .gbs .head .r{ display:flex; align-items:center; gap:10px; flex-wrap:wrap }
  .gbs .badge{ font-size:12px; font-weight:700; color:var(--grn2); background:var(--grn-soft); border:1px solid #cdeede; border-radius:999px; padding:7px 14px; white-space:nowrap }
  .gbs .share{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--nv); background:var(--card); border:1px solid var(--line); border-radius:999px; padding:7px 14px; cursor:pointer }
  .gbs .share:hover{ border-color:var(--grn); color:var(--grn2) }
  .gbs .share svg{ width:14px; height:14px }

  .gbs .grid{ display:grid; grid-template-columns:0.95fr 1.05fr; gap:18px; align-items:stretch }
  .gbs .card{ background:var(--card); border:1px solid var(--line); border-radius:22px; padding:26px; box-shadow:0 20px 50px -38px rgba(11,37,69,.3) }
  /* main score */
  .gbs .scard{ display:flex; flex-direction:column; justify-content:center }
  .gbs .scorewrap{ display:flex; align-items:center; gap:24px; flex-wrap:wrap }
  .gbs .ring{ --p:72; width:150px; height:150px; flex:0 0 auto; border-radius:50%; display:grid; place-items:center;
    background:radial-gradient(closest-side, var(--card) 77%, transparent 78%), conic-gradient(var(--grn) calc(var(--p)*1%), #e8f7f0 0) }
  .gbs .ring .lab{ font-size:9.5px; font-weight:800; letter-spacing:.14em; color:var(--grn2) }
  .gbs .ring .n{ font-size:52px; font-weight:900; color:var(--nv); line-height:1; font-variant-numeric:tabular-nums }
  .gbs .ring .jp{ font-size:10px; color:var(--sub); font-weight:700 }
  .gbs .sdelta{ display:flex; gap:10px; flex-wrap:wrap }
  .gbs .sdelta .d{ background:var(--grn-soft); border:1px solid #d6f0e4; border-radius:12px; padding:9px 13px; font-size:12.5px; color:var(--nv); font-weight:700 }
  .gbs .sdelta .d b{ color:var(--grn2); font-variant-numeric:tabular-nums }
  .gbs .snote{ margin:18px 0 0; font-size:11.5px; color:var(--sub); line-height:1.6 }
  /* breakdown */
  .gbs .bd-t{ font-size:13px; font-weight:900; margin:0 0 4px }
  .gbs .bd-s{ font-size:11.5px; color:var(--sub); margin:0 0 16px }
  .gbs .brow{ margin-bottom:13px }
  .gbs .brow:last-child{ margin-bottom:0 }
  .gbs .brow .bl{ display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px }
  .gbs .brow .bl .k{ font-weight:700; color:var(--nv) }
  .gbs .brow .bl .v{ font-weight:800; color:var(--nv); font-variant-numeric:tabular-nums }
  .gbs .btrack{ height:7px; border-radius:6px; background:#eef2f7; overflow:hidden }
  .gbs .btrack > i{ display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,#3fd39b,var(--grn)) }
  /* ai */
  .gbs .ai{ margin-top:18px; background:var(--grn-soft); border:1px solid #d6f0e4 }

  /* charts */
  .gbs .charts{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:18px }

    .gbs .grid,.gbs .charts{ grid-template-columns:1fr }

  }

  /* ===== 管理者：コンディション要因分析（集約・匿名。.gbc スコープ） ===== */
  .gbc{ --nv:#0B2545; --grn:#16C784; --grn2:#0ea968; --sub:#64748B; --card:#FFFFFF; --line:#E2E8F0; --grn-soft:#EFFFF8; --amber:#B7791F; --amber-soft:#FBF1DD; --ink:#0B2545; color:var(--ink) }
  .gbc *{box-sizing:border-box}
  .gbc .privacy{ display:flex; gap:11px; align-items:flex-start; background:var(--grn-soft); border:1px solid #cdeede; border-radius:14px; padding:13px 16px; margin-bottom:18px; font-size:12.5px; color:var(--nv); line-height:1.6 }

  .gbc .kpi .l{ font-size:11.5px; color:var(--sub); margin-top:7px }
  .gbc h3.t{ font-size:14px; font-weight:900; margin:0 0 3px }
  .gbc .st{ font-size:11.5px; color:var(--sub); margin:0 0 16px }
  /* 要因分解 */
  .gbc .fac{ padding:13px 0; border-bottom:1px solid var(--line) }
  .gbc .fac:last-child{ border-bottom:0 }
  .gbc .fac .fh{ display:flex; justify-content:space-between; align-items:baseline; gap:10px }
  .gbc .fac .fn{ font-size:13.5px; font-weight:800; color:var(--nv) }
  .gbc .fac .fp{ font-size:14px; font-weight:900; color:var(--nv); font-variant-numeric:tabular-nums }
  .gbc .fac .ft{ font-size:11px; font-weight:800; border-radius:999px; padding:2px 8px; margin-left:6px }
  .gbc .fac .ft.up{ background:var(--amber-soft); color:var(--amber) }
  .gbc .fac .ft.flat{ background:#eef2f7; color:var(--sub) }
  .gbc .fac .track{ height:8px; border-radius:6px; background:#eef2f7; overflow:hidden; margin:8px 0 7px }
  .gbc .fac .track > i{ display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,#f0b757,var(--amber)) }
  .gbc .fac .act{ font-size:12px; color:var(--sub) }
  .gbc .fac .act b{ color:var(--grn2) }
  /* 時期パターン */
  .gbc .pat{ display:flex; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); font-size:13px }
  .gbc .pat:last-child{ border-bottom:0 }
  .gbc .pat .ic{ width:34px; height:34px; border-radius:10px; background:var(--grn-soft); color:var(--grn2); display:grid; place-items:center; flex:0 0 auto }
  .gbc .pat b{ color:var(--nv) }
  /* チーム表 */
  .gbc table{ width:100%; border-collapse:collapse; font-size:13px }
  .gbc th{ text-align:left; font-size:11px; letter-spacing:.04em; color:var(--sub); font-weight:800; padding:0 10px 9px; border-bottom:1px solid var(--line) }
  .gbc td{ padding:11px 10px; border-bottom:1px solid var(--line) }
  .gbc tr:last-child td{ border-bottom:0 }
  .gbc .mask{ color:var(--sub); font-style:normal; background:#f4f6fa; border-radius:8px; padding:2px 8px; font-size:11.5px }
  .gbc .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:-1px }
  /* 週次モチベサマリー */
  .gbc .wk-head{ display:flex; flex-direction:column; gap:10px }
  .gbc .wk-h-row{ display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--nv); line-height:1.7; font-weight:600 }
  .gbc .wk-dot{ width:8px; height:8px; border-radius:50%; background:var(--grn); flex:0 0 auto; margin-top:8px }
  .gbc .wk-item{ display:flex; gap:11px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--line) }
  .gbc .wk-item:last-child{ border-bottom:0 }
  .gbc .wk-item .wk-ic{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center; flex:0 0 auto }
  .gbc .wk-item .wk-ic svg{ width:17px; height:17px }
  .gbc .wk-item.good .wk-ic{ background:var(--grn-soft); color:var(--grn2) }
  .gbc .wk-item.care .wk-ic{ background:var(--amber-soft); color:var(--amber) }
  .gbc .wk-item b{ font-size:13.5px; color:var(--nv) }
  .gbc .wk-item p{ font-size:12px; color:var(--sub); margin:3px 0 0; line-height:1.65 }
  .gbc .wk-actions{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px }
  .gbc .wk-actions li{ display:flex; gap:11px; align-items:flex-start; font-size:13.5px; color:var(--nv); line-height:1.65 }
  .gbc .wk-no{ width:22px; height:22px; border-radius:50%; background:var(--nv); color:#fff; font-size:12px; font-weight:800; display:grid; place-items:center; flex:0 0 auto; margin-top:1px }
  @media(max-width:800px){ .gbc .grid2{ grid-template-columns:1fr } .gbc .kpis{ grid-template-columns:1fr 1fr } }
</style>

var RISK_WORDS=['辞め','やめ','限界','無理','きつ','しんど','疲れ','評価されない','報われない','孤立','相談できない','相談したい','プレッシャー','不安','焦り','自信をなく','余裕がない'];
var POS_WORDS=['楽しい','成長','達成','嬉しい','自信がつい','やりがい','前向き','手応え','チーム','勝て','刺さっ'];
function mineText(memberId){
  var arr=MEMBER_DIARY[memberId]||[]; var text=arr.join(' ');
  var hits=RISK_WORDS.filter(function(w){return text.indexOf(w)>=0;});
  var pos=POS_WORDS.filter(function(w){return text.indexOf(w)>=0;});
  var score=Math.max(0,Math.min(100, 50 - hits.length*12 + pos.length*8));
  var level= score<35?'high': score<55?'mid':'lo';
  var summary = hits.length ? ('ネガティブ語「'+hits.slice(0,3).join('」「')+'」を検出。早めの声かけ推奨。') : '前向きな語が中心で、本音も安定傾向。';
  return { riskWords:hits, posWords:pos, score:score, level:level, summary:summary, count:arr.length };
}
function orgTopWords(){
  var c={}; Object.keys(MEMBER_DIARY).forEach(function(id){ var t=MEMBER_DIARY[id].join(' '); RISK_WORDS.concat(POS_WORDS).forEach(function(w){ if(t.indexOf(w)>=0) c[w]=(c[w]||0)+1; }); });
  return Object.keys(c).map(function(w){return {w:w,n:c[w],risk:RISK_WORDS.indexOf(w)>=0};}).sort(function(a,b){return b.n-a.n;}).slice(0,14);
}

/* ===== ④ 営業スキルマップ（Q8：架電・メンタル等を多軸可視化） ===== */
var SKILL_AXES=['架電力','ヒアリング力','提案力','クロージング力','メンタル・継続力','関係構築力'];
function memberSkills(m){
  return SKILL_AXES.map(function(a,i){ var s=hash(m.name+'#'+i); return {axis:a, val:clamp(Math.round(m.score*0.5 + (s%100)*0.5),22,99)}; });
}
function radarSVG(skills,size){
  size=size||230; var cx=size/2, cy=size/2, R=size/2-30, n=skills.length;
  function pt(i,r){ var ang=-Math.PI/2 + i*2*Math.PI/n; return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r]; }
  var grid=[25,50,75,100].map(function(g){ var pts=skills.map(function(s,i){var p=pt(i,R*g/100);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '); return '<polygon points="'+pts+'" fill="none" stroke="var(--line)"/>'; }).join('');
  var axes=skills.map(function(s,i){var p=pt(i,R);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="var(--line)"/>';}).join('');
  var dataPts=skills.map(function(s,i){var p=pt(i,R*s.val/100);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var labels=skills.map(function(s,i){var p=pt(i,R+16); var anchor=Math.abs(p[0]-cx)<6?'middle':(p[0]>cx?'start':'end'); return '<text x="'+p[0].toFixed(1)+'" y="'+p[1].toFixed(1)+'" font-size="9" fill="var(--mut)" text-anchor="'+anchor+'" dominant-baseline="middle">'+s.axis+'</text>';}).join('');
  return '<svg viewBox="0 0 '+size+' '+size+'" style="width:100%;max-width:'+size+'px;display:block;margin:0 auto">'+grid+axes+'<polygon points="'+dataPts+'" fill="rgba(245,66,122,.18)" stroke="var(--pink)" stroke-width="2"/>'+labels+'</svg>';
}

/* ===== ⑤ ハイパフォーマー分析（Q9=複合：成約・粗利・継続・離職しない） ===== */
var MEMBER_PERF={
  m1:{deals:5,gp:680,tenure:24,retention:90}, m2:{deals:1,gp:120,tenure:8,retention:45},

};
function performScore(m){ var p=MEMBER_PERF[m.id]||{deals:0,gp:0,tenure:0,retention:50};
  var sDeals=Math.min(100,p.deals/6*100), sGp=Math.min(100,p.gp/800*100), sTen=Math.min(100,p.tenure/36*100), sRet=p.retention;
  return Math.round(sDeals*0.35 + sGp*0.3 + sRet*0.2 + sTen*0.15); }
function topPerformers(){ return MEMBERS.slice().map(function(m){return {m:m,ps:performScore(m)};}).sort(function(a,b){return b.ps-a.ps;}); }
function commonTraits(){
  var top=topPerformers().slice(0,3).map(function(x){return x.m;}); var t=[];
  var avgSubmit=top.reduce(function(a,m){return a+m.submit.reduce(function(x,y){return x+y;},0);},0)/(top.length*3);
  if(avgSubmit>=0.8) t.push('日報の継続入力率が高い（習慣化できている）');
  var avgMood=top.reduce(function(a,m){return a+m.mood[m.mood.length-1];},0)/top.length;
  if(avgMood>=3) t.push('気分・メンタルが安定している');
  t.push('クロージング力・架電力が平均より高い'); t.push('成長スコアが継続的に上昇傾向');
  return {top:top, traits:t};
}

/* ===== ⑥ パルスサーベイ / eNPS（Q1 エンゲージメント） ===== */
var PULSE={ responses:[ {name:'鈴木 健',cond:5,enps:9},{name:'渡辺 彩',cond:4,enps:8},{name:'伊藤 大和',cond:3,enps:7},{name:'山本 蓮',cond:2,enps:4},{name:'佐藤 美咲',cond:2,enps:5},{name:'高橋 由依',cond:2,enps:3} ], myDone:false };

function answerInsight(q){
  q=q||'';
  if(/離職|予兆|辞め|リスク/.test(q)){ var hi=MEMBERS.map(function(m){return {m:m,r:mineText(m.id)};}).filter(function(x){return x.r.level==='high';}); return hi.length?('離職予兆が高いのは '+hi.map(function(x){return x.m.name;}).join('・')+' の'+hi.length+'名。日記から「'+(hi[0].r.riskWords.slice(0,2).join('」「'))+'」等を検出。早めの1on1を推奨します。'):'現在、離職予兆“高”のメンバーはいません。'; }
  if(/共通点|ハイパフォ|成約|できる人|トップ|売れ/.test(q)){ var ct=commonTraits(); return '成果上位は '+ct.top.map(function(m){return m.name;}).join('・')+'。共通点は『'+ct.traits.join('』『')+'』。育成・採用基準に活用できます。'; }
  if(/コンディション|気分|落ち|疲|元気/.test(q)){ var low=MEMBERS.filter(function(m){return m.mood[m.mood.length-1]<=2;}); return low.length?('コンディション低下は '+low.map(function(m){return m.name;}).join('・')+'。eNPS '+enpsScore()+'／平均コンディション '+avgCondition()+' も合わせて要注意。'):'目立ったコンディション低下はありません（eNPS '+enpsScore()+'）。'; }
  if(/コーチング|優先|フォロー|面談/.test(q)){ var f=MEMBERS.filter(function(m){return m.risk!=='lo';}); return 'コーチング優先は '+f.map(function(m){return m.name+'（'+(m.flags[0]||'要観察')+'）';}).join('、')+'。'; }
  if(/部署|チーム/.test(q)){ var d={}; MEMBERS.forEach(function(m){ (d[m.dept]=d[m.dept]||[]).push(m.score); }); var arr=Object.keys(d).map(function(k){return k+'：平均'+Math.round(d[k].reduce(function(a,b){return a+b;},0)/d[k].length);}); return '部署別の平均成長スコアは '+arr.join(' ／ ')+' です。'; }
  return 'データから分析します。「離職予兆」「成約の共通点」「コンディション低下」「コーチング優先」「部署別」などで聞くと具体的に回答します。（実Claude接続でさらに自由な分析が可能です）';
}

function ymd(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function jpDate(s){ var p=s.split('-'); return (p[1]*1)+'月'+(p[2]*1)+'日'; }

function coachSlots(d){ var dow=d.getDay(); if(dow===0||dow===6) return []; var h=(d.getDate()*7)%10; return SCHED_SLOTS.filter(function(t,i){ return (h+i)%2===0; }); }
function schedMonth(){ var t=new Date(); return new Date(t.getFullYear(), t.getMonth()+SCHEDULE.monthOffset, 1); }
function nextCoachSlot(fromYmd){ // コーチの「別日提案」用：翌営業日以降の最初の空き枠
  var p=fromYmd.split('-'); var d=new Date(p[0],p[1]-1,p[2]);

}

function collectData(){ return { streak:ME.streak, mood:state.mood, diary:state.diary, aiComment:state.aiComment, goals:GOALS, videos:MY_VIDEOS, personality:state.personality, vision:state.vision, onbAnswers:state.onbAnswers, onboarding:state.onboarding, assignedCoach:state.assignedCoach, msQueue:state.msQueue, msProgress:state.msProgress, todayState:state.todayState, dream:state.dream }; }
function applyData(d){ if(!d) return;
  if(typeof d.streak==='number') ME.streak=d.streak;
  if(d.mood) state.mood=Object.assign(state.mood,d.mood);
  if(d.diary) state.diary=Object.assign(state.diary,d.diary);
  if(d.aiComment) state.aiComment=d.aiComment;
  if(d.personality) state.personality=d.personality;
  if(d.vision) state.vision=Object.assign(state.vision,d.vision);
  if(d.dream) state.dream=Object.assign(state.dream||{},d.dream);
  if(d.onbAnswers) state.onbAnswers=Object.assign(state.onbAnswers||{},d.onbAnswers);
  if(d.onboarding) state.onboarding=d.onboarding;
  if(d.assignedCoach) state.assignedCoach=d.assignedCoach;
  if(Array.isArray(d.leaderNotes)) state.leaderNotes=d.leaderNotes;
  if(Array.isArray(d.goals)&&d.goals.length) GOALS=d.goals;
  if(Array.isArray(d.videos)) MY_VIDEOS=d.videos;
  if(Array.isArray(d.msQueue)) state.msQueue=d.msQueue;
  if(typeof d.msProgress==='number') state.msProgress=d.msProgress;
  if(d.todayState) state.todayState=d.todayState;
}

// 実LLM呼び出し（kindでサーバーが実行 or スタンドアロンはブラウザ直叩き）。null=モックにフォールバック。
async function aiCall(kind, input, schema, system){
  if(SERVER && USER){
    if(!AI_ENABLED) return null; // サーバーにキー未設定 → モック
    var r=await fetch('/api/ai',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({kind:kind, input:input})});
    if(!r.ok){ var e=await r.json().catch(function(){return{};}); throw new Error(e.error||('AI '+r.status)); }
    return await r.json();
  }
  if(cfg.live && cfg.apiKey){ var txt=await callClaude(system, input, schema); return JSON.parse(txt); }
  return null;
}

// 実LLM呼び出し（ブラウザ直叩き：PoC専用）。本番はサーバ関数経由に置換。
async function callClaude(system, userText, schema){
  var body={ model:cfg.model||'claude-opus-4-8', max_tokens:1024, system:system, messages:[{role:'user', content:userText}] };
  if(schema){ body.output_config={ format:{ type:'json_schema', schema:schema } }; }
  var res=await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':cfg.apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify(body)
  });
  if(!res.ok){ var t=await res.text(); throw new Error('API '+res.status+'：'+t.slice(0,160)); }
  var data=await res.json();
  return (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
}

function sparkline(data,w,h){
  w=w||320;h=h||74;var max=Math.max.apply(null,data),min=Math.min.apply(null,data);var pad=8;
  var pts=data.map(function(v,i){var x=pad+i*((w-pad*2)/(data.length-1));var y=h-pad-((v-min)/((max-min)||1))*(h-pad*2);return [x,y];});
  var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var area='8,'+(h-pad)+' '+poly+' '+(w-pad)+','+(h-pad);var last=pts[pts.length-1];
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polygon class="area" points="'+area+'"/><polyline points="'+poly+'"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.5"/></svg>';
}

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function followerScore(followers){ var lo=1000,hi=10000000; if(followers<=lo) return 0; var s=(Math.log10(followers)-Math.log10(lo))/(Math.log10(hi)-Math.log10(lo))*100; return clamp(Math.round(s),0,100); }

function coefficientK(F,C,alpha,beta){ alpha=alpha||1; beta=beta||1; var raw=Math.pow(F,alpha)*Math.pow(C,beta); var max=Math.pow(100,alpha)*Math.pow(100,beta); return clamp(Math.round(raw/max*100),0,100); }

// ① 本音・離職予兆分析（テキストマイニング）
// 管理者：コンディション要因分析（集約・匿名。個人は特定できない。5名未満のチームは非表示）
VIEWS.admin.condition=function(){
  var total=MEMBERS.length;
  var lastMood=function(m){ return m.mood[m.mood.length-1]; };
  var avgMood=(MEMBERS.reduce(function(a,m){return a+lastMood(m);},0)/total); // 1-5
  var follow=MEMBERS.filter(function(m){return m.risk==='mid'||m.risk==='hi';}).length;
  var contBreak=MEMBERS.filter(function(m){return /未提出/.test(m.flags.join(''));}).length;
  // 要因シグナルの集約（生の日記文は使わず、構造化シグナルのみ）
  var sig={overload:1, relation:1, meaning:1, confidence:1, continuity:1};
  MEMBERS.forEach(function(m){ var f=m.flags.join('');
    if(/未提出/.test(f)) sig.continuity+=2;
    if(/低下|急落/.test(f)){ sig.overload+=1; sig.confidence+=1; }
    if(/未達/.test(f)){ sig.meaning+=1; sig.confidence+=1; }
    if(/上司面談|コーチング希望/.test(f)) sig.relation+=1;
    if(lastMood(m)<=2) sig.overload+=1;
  });
  var facs=[
    {k:'overload', n:'過負荷（疲労の蓄積）', act:'繁忙期の業務配分と、休息・回復の確保を。'},
    {k:'confidence', n:'うまくいかない体験の連続（自信の低下）', act:'小さな成功体験の設計と、同行・フォローを。'},
    {k:'continuity', n:'継続の断絶（入力・行動が途切れる）', act:'途切れかけへの早期の声かけと、ハードルを下げる支援を。'},
    {k:'relation', n:'対人・チーム関係', act:'1on1の頻度と、チーム内の関係づくりを。'},
    {k:'meaning', n:'仕事の意義・アサインのミスマッチ', act:'目標の意味づけと、配置・役割の見直しを。'}
  ];
  var sum=facs.reduce(function(a,x){return a+sig[x.k];},0);
  facs.forEach(function(x){ x.pct=Math.round(sig[x.k]/sum*100); });
  facs.sort(function(a,b){return b.pct-a.pct;});
  var maxp=facs[0].pct||1;
  var facRows=facs.map(function(x,i){
    var trend=i<2?'<span class="ft up">悪化傾向 ↑</span>':'<span class="ft flat">横ばい →</span>';
    return '<div class="fac"><div class="fh"><span class="fn">'+x.n+trend+'</span><span class="fp">'+x.pct+'%</span></div>'
      + '<div class="track"><i style="width:'+Math.round(x.pct/maxp*100)+'%"></i></div>'
      + '<div class="act">打ち手：<b>'+x.act+'</b></div></div>';
  }).join('');
  // 時期パターン（構造化データから見える典型。※デモ）
  var pats=[
    ['月末に低下が集中','業務負荷のピークと連動。締め前の配分見直しが効きます。'],
    ['新人は入社3週目に自信が落ちやすい','立ち上がり期の壁。この時期の同行・声かけを厚く。'],
    ['連休明けの月曜は切り替えが鈍る','週初のリズムづくり（軽い一歩の設計）を。']
  ].map(function(p){ return '<div class="pat"><div class="ic">'+svg('activity')+'</div><div><b>'+p[0]+'</b><div class="st" style="margin:2px 0 0">'+p[1]+'</div></div></div>'; }).join('');
  // チーム別（集約。5名未満は非表示＝個人特定を防ぐ）
  var depts={}; MEMBERS.forEach(function(m){ (depts[m.dept]=depts[m.dept]||[]).push(m); });
  var teamRows=Object.keys(depts).map(function(d){
    var arr=depts[d], cnt=arr.length;
    if(cnt<5){ return '<tr><td><b>'+d+'</b></td><td colspan="3"><span class="mask">'+svg('lock')+' データ保護のため非表示（5名未満）</span></td></tr>'; }
    var am=(arr.reduce(function(a,m){return a+lastMood(m);},0)/cnt);
    var down=arr.filter(function(m){return m.trend==='down';}).length;
    var col=am>=3.4?'#16C784':am>=2.6?'#C9A227':'#EC407A';
    return '<tr><td><b>'+d+'</b> <span class="mut" style="color:#64748B;font-size:11px">'+cnt+'名</span></td>'
      + '<td><span class="dot" style="background:'+col+'"></span>'+am.toFixed(1)+' / 5</td>'
      + '<td>'+down+'名 低下傾向</td><td class="mut" style="color:#64748B">要因：過負荷</td></tr>';
  }).join('');
  var topFac=facs[0].n.split('（')[0];

// 面談カレンダー（コーチと相互に日程調整）
VIEWS.user.schedule=function(){
  var an=assignedAnnouncer();
  var m=schedMonth(), year=m.getFullYear(), mon=m.getMonth(), today=schedToday();
  var firstDow=new Date(year,mon,1).getDay(), days=new Date(year,mon+1,0).getDate(), sel=state.schedSel||'';
  var conf = SCHEDULE.confirmed ? '<div class="sched-conf"><div class="sc-ic">'+svg('check')+'</div><div style="flex:1;min-width:0"><div class="muted" style="font-size:11px;font-weight:800;color:var(--em-dark)">面談 確定</div><b style="font-size:16px">'+jpDateW(SCHEDULE.confirmed.date)+' '+SCHEDULE.confirmed.time+'〜</b><div class="muted" style="font-size:12px">'+an.name+' とのオンライン面談</div></div><button class="btn btn-ghost btn-sm" data-cancelsched="1">取消</button></div>' : '';
  var dows=['日','月','火','水','木','金','土'].map(function(d,i){return '<div class="dow'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>';}).join('');
  var cells='';
  for(var b=0;b<firstDow;b++){ cells+='<div class="cal-c empty"></div>'; }
  for(var day=1;day<=days;day++){
    var d=new Date(year,mon,day), s=ymd(d), slots=coachSlots(d), isPast=d<today, isConf=SCHEDULE.confirmed&&SCHEDULE.confirmed.date===s;
    var cls='cal-c';
    if(isConf) cls+=' confirmed'; else if(isPast) cls+=' past'; else if(slots.length){ cls+=' has'; if(sel===s) cls+=' sel'; }
    if(s===ymd(today)) cls+=' today';
    var clickable=(!isPast && slots.length && !isConf);
    cells+='<div class="'+cls+'"'+(clickable?' data-schedday="'+s+'"':'')+'>'+day+(slots.length&&!isPast?'<span class="av">空き'+slots.length+'</span>':'')+(clickable?'<span class="dot"></span>':'')+'</div>';
  }
  var grid='<div class="card"><div class="cal-head"><button class="btn btn-soft btn-sm" data-schedmonth="-1"'+(SCHEDULE.monthOffset<=0?' disabled':'')+'>‹ 前月</button><div class="mlabel">'+year+'年 '+(mon+1)+'月</div><button class="btn btn-soft btn-sm" data-schedmonth="1">翌月 ›</button></div>'
    + '<div class="cal-m">'+dows+cells+'</div>'
    + '<p class="muted" style="font-size:11px;margin:10px 0 0">ピンクの日が<b>コーチの空き枠</b>。日付を選ぶと時間が出ます（土日・過去日は不可）。</p>';
  if(sel){ var sp=sel.split('-'), sd=new Date(sp[0],sp[1]-1,sp[2]), ss=coachSlots(sd);
    grid+='<div style="margin-top:6px;border-top:1px solid var(--line);padding-top:12px">'+secH('clock',jpDateW(sel)+' の空き枠')+'<div class="slot-row">'+ss.map(function(t){return '<button class="slot" data-schedslot="'+sel+'|'+t+'">'+t+'〜</button>';}).join('')+'</div><p class="muted" style="font-size:11px;margin:8px 0 0">時間を選ぶと、コーチへ予約リクエストを送ります。</p></div>';
  }
  grid+='</div>';
  var reqs=SCHEDULE.reqs.filter(function(r){return r.status!=='declined';});
  var reqHtml = reqs.length ? '<div class="card" style="margin-top:16px">'+secH('message','日程のやりとり')+reqs.map(function(r){
    var fromMe=r.by==='member';
    var statusTxt = r.status==='confirmed' ? '確定' : fromMe ? 'コーチの返信待ち' : 'あなたの承認待ち';
    var act='';
    if(r.status==='pending'){
      act = fromMe ? '<button class="btn btn-em btn-sm" data-coachrespond="'+r.id+':ok">（デモ）コーチが承認</button><button class="btn btn-ghost btn-sm" data-coachrespond="'+r.id+':alt">（デモ）コーチが別日を提案</button>'
                   : '<button class="btn btn-em btn-sm" data-acceptsched="'+r.id+'">この日で承認する</button><button class="btn btn-ghost btn-sm" data-declinesched="'+r.id+'">辞退</button>';
    }
    return '<div class="sched-req"><div class="si '+(fromMe?'m':'c')+'">'+svg(fromMe?'user':'announcer')+'</div><div class="sb"><b>'+jpDateW(r.date)+' '+r.time+'〜</b><div class="sd">'+(fromMe?'あなた → コーチ へ提案':an.name+' → あなた へ提案')+' ／ '+statusTxt+'</div>'+(act?'<div class="sact">'+act+'</div>':(r.status==='confirmed'?'<span class="pill em" style="margin-top:6px;display:inline-block">確定済み</span>':''))+'</div></div>';
  }).join('')+'</div>' : '';
  return pageHead('面談カレンダー','担当コーチ（'+an.name+'）との面談日をカレンダーで相互調整。空き枠から選ぶ→承認／別日提案でやりとりします。',
      SCHEDULE.confirmed?'<span class="pill em">確定済み</span>':'<span class="pill pink">調整中</span>')
    + conf + grid + reqHtml;
};

/* ===== シンプルな3軸・構造的評価（行動／継続／状態）→ 今日の評価スコア1つ ===== */
/* ===== GABASHO SCORE：営業KPIを使わず、状態(気分)×継続×前進で算出 ===== */
var GBZ_STATE = { good:{boost:10,label:'いい感じ'}, normal:{boost:0,label:'ふつう'}, heavy:{boost:-8,label:'重い'}, 'switch':{boost:5,label:'切り替えたい'} };
// GABASHO SCORE は「クリックで上がる」ものではなく、努力が“承認”されて上がる。
// プロセス：マイナス思考 → コーチ → 結果 → 承認。承認された努力だけがスコアを押し上げる。
var GROWTH_STEPS=[
  {t:'マイナス思考', d:'重さや不安を、正直に記録する', ic:'🌧'},
  {t:'コーチ',      d:'担当コーチが受け止め、一歩を一緒に決める', ic:'🤝'},
  {t:'結果',        d:'決めた一歩を実行して、小さな結果を残す', ic:'🎯'},
  {t:'承認',        d:'その努力をコーチが承認 → スコアに反映', ic:'✅'}
];
// これまで“承認された努力”の履歴（※サンプル）。件数がスコアの土台になる。
var GROWTH_LOG=[
  {date:'6/28', neg:'訪問が続けて断られて、心が折れそうだった', step:'冒頭のひとことを変えて、あと1件だけ回る', result:'断られ続けた後の1件がアポにつながった', coach:'三上 あかり', pts:6},
  {date:'6/24', neg:'朝から気分が重く、電話をかけるのが怖かった', step:'まず5分だけ、受電リストを整えるところから', result:'気づいたら10件架電できていた', coach:'三上 あかり', pts:5},
  {date:'6/19', neg:'先輩と比べて、自分はダメだと落ち込んでいた', step:'人と比べず「昨日の自分」との比較に切り替える', result:'昨日より提案を1つ多く出せた', coach:'三上 あかり', pts:5},
  {date:'6/14', neg:'目標に届かず、続ける意味を見失いかけた', step:'目標を小さく割り直して、今日の一歩にする', result:'その一歩をやり切って、リズムが戻った', coach:'三上 あかり', pts:4}
];
function approvedEfforts(){ return (typeof state.approvedCount==='number') ? state.approvedCount : GROWTH_LOG.filter(function(c){return c;}).length; }
// 今日のサイクルがどこまで進んだか（4ステップの達成フラグ）
function stageFlags(){
  var d=state.diary||{};
  var neg=!!state.todayState || Object.keys(state.mood||{}).some(function(k){return (state.mood||{})[k];});
  var recorded=!!state.savedToday;             // 記録＝コーチが受け止める
  var result=!!(d.done&&d.done.trim());        // 小さな結果を残した
  var approved=!!state.todayApproved;          // コーチが承認（＝スコア反映）
  return [neg, recorded, result, approved];
}
function gabashoScore(){
  var approved=approvedEfforts();
  var cont=Math.min(100, Math.round((ME.streak||0)/30*100));   // 継続（積み重ね）
  var earned=Math.min(100, 46 + approved*6);                   // 承認された努力の積み上げ
  var total=Math.round(earned*0.62 + cont*0.38);
  return { total: total, earned: earned, cont: cont, approved: approved, dod: (state.lastApproveGain||0) };
}
function score3(){
  var d=state.diary||{}; var n=function(k){ var x=parseInt(d[k],10); return isNaN(x)?0:x; };
  var action=Math.min(100, n('callTarget')*2 + n('visitTarget')*6 + n('apptTarget')*15 + n('meetings')*18);
  var continuity=Math.min(100, Math.round((ME.streak||0)/30*100));
  var mv=(state.mood&&state.mood.mood)||0;
  var condition= mv ? mv*20 : 60;
  var total=Math.round(action*0.4 + continuity*0.3 + condition*0.3);
  return { action:action, continuity:continuity, condition:condition, total:total, streak:ME.streak||0, mood:mv };
}
function eval3Card(){
  var s=score3();
  function bar(label,v,color){ return '<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:4px"><span>'+label+'</span><span class="num">'+v+'</span></div><div style="height:8px;border-radius:6px;background:var(--em-soft);overflow:hidden"><div style="height:100%;width:'+v+'%;background:'+color+'"></div></div></div>'; }
  var why='行動 '+s.action+'（今日の活動量）＋ 継続 '+s.continuity+'（'+s.streak+'日連続）＋ 状態 '+s.condition+'（気分 '+(s.mood||'-')+'/5）を 4:3:3 で合成。';
  return '<div class="card" style="margin-top:14px;display:flex;gap:22px;align-items:center;flex-wrap:wrap">'
    + '<div class="ring" style="--p:'+s.total+';flex:0 0 auto"><div class="in"><b>'+s.total+'</b><small>今日の評価</small></div></div>'
    + '<div style="flex:1;min-width:240px">'
      + bar('行動', s.action, 'var(--em-deep)') + bar('継続', s.continuity, 'var(--gold)') + bar('状態', s.condition, 'var(--pink)')
      + '<p class="muted" style="margin:6px 0 0;font-size:11.5px">'+why+'</p>'
    + '</div></div>';
}
function memberAlerts(){
  return MEMBERS.filter(function(m){return m.flags.length;}).map(function(m){
    var f=m.flags.join('');
    var type=f.indexOf('未提出')>=0?'no_input':(f.indexOf('低下')>=0?'high_fatigue':(f.indexOf('急落')>=0?'score_drop':'low_mood'));
    var rec=m.risk==='hi'?'明日までに上司から短い声かけを推奨。例：「最近どう？今どこが一番詰まってる？」'
           :m.coach?'コーチング予約を案内。例：「今週の勝ちポイントを一緒に確認しよう」'
           :'まず1つだけ終わらせる声かけを。例：「今日は1個だけ、一緒に片付けよう」';

  });

// 成長のプロセス：マイナス思考→コーチ→結果→承認 を可視化。承認だけがスコアを上げる。
// compact=true でセットアップ用の説明のみ（進捗ステータス・承認ログなし）
function growthProcessCard(compact){
  var done=compact?[false,false,false,false]:stageFlags();
  var nodes=GROWTH_STEPS.map(function(s,i){
    var st=compact?'':(done[i]?'done':((i===0||done[i-1])?'active':'todo'));
    return '<div class="gp-node '+st+'"><div class="gp-ic">'+s.ic+'</div><div class="gp-b"><b>'+s.t+'</b><small>'+s.d+'</small></div></div>'
      + (i<GROWTH_STEPS.length-1?'<span class="gp-arrow">'+svg('trendUp')+'</span>':'');
  }).join('');
  var status=done[3]?'今日の努力は承認されました。':done[2]?'結果まで残せました。あとはコーチの承認を待ちましょう。':done[1]?'記録しました。コーチが受け止めます。':done[0]?'正直に出せています。この後の一歩を決めましょう。':'まずは今の状態を、正直に選ぶところから。';
  var log=GROWTH_LOG.slice(0,3).map(function(c){
    return '<div class="gp-log"><span class="gp-date">'+c.date+'</span><div class="gp-log-b"><p class="neg">🌧 '+c.neg+'</p><p class="res">🎯 '+c.result+'</p><span class="gp-coach">'+c.coach+' が承認</span></div><span class="gp-pts">+'+c.pts+'</span></div>';
  }).join('');
  return '<div class="sec"><div class="sec-t">'+(compact?'スコアの上がり方（大事な仕組み）':'努力が承認されて、スコアは上がる')+'</div>'
    + '<div class="card gp-card">'
    + '<div class="gp-flow">'+nodes+'</div>'
    + (compact?'':'<div class="gp-status">'+status+'</div>')
    + '<div class="gp-note">'+svg('sparkles')+'<span>スコアは自己申告では上がりません。<b>マイナス思考を正直に出す → コーチが受け止める → 一歩の結果を出す → コーチが承認</b>。この“承認”でだけ、スコアが上がります。</span></div>'
    + (compact?'':'<div class="gp-log-h">これまで承認された努力（'+approvedEfforts()+'件）</div>'+log)
    + '</div></div>';
}

  }
  var axes = axis('mood','重い','軽い','気分')
    + axis('motivation','低い','高い','やる気')
    + axis('confidence','不安','自信','自信')
    + axis('fatigue','元気','疲れ','コンディション')
    + axis('stress','穏やか','張り詰め','心のゆとり')

/* GABASHO SCORE：営業KPIを使わない“状態”の6内訳（相談力は廃止） */
function scoreBd6(){
  var mo=state.mood||{}, d=state.diary||{};
  var filled=['mood','motivation','fatigue','confidence','stress','satisfaction'].filter(function(k){return mo[k];}).length;
  function cl(x){ return Math.max(0,Math.min(100,Math.round(x))); }
  return [
    ['継続力', cl(55 + Math.min(40,(ME.streak||0)*1.5))],
    ['行動力', cl(60 + ((d.todayFocus&&d.todayFocus.trim())?18:0) + (state.todayState?10:0))],
    ['自己理解', cl(55 + filled/6*40)],
    ['切り替え力', cl(60 + (state.todayState==='switch'?24:0) + (state.todayState==='heavy'?10:0) + (mo.motivation?8:0))],
    ['前向き力', cl(55 + ((d.done&&d.done.trim())?22:0) + ((mo.mood||0)>=4?15:0))],
    ['やり切り力', cl(55 + (state.savedToday?24:0) + Math.min(16,(ME.streak||0)*0.7))]
  ];
}
function weeklyComment(bd){
  var sorted=bd.slice().sort(function(a,b){return b[1]-a[1];});
  var top=sorted[0][0], low=sorted[sorted.length-1][0];
  var nudge={ '継続力':'次は「今日の一歩」を少しだけ具体的にすると、さらに前に進みやすくなります。',
    '行動力':'重い日は、切り替える一手だけ決めておくと動き出しやすくなります。',
    '自己理解':'今日できた小さな前進を1つ残すと、前向き力が伸びていきます。',
    '切り替え力':'続けている事実を見返すと、続ける力がさらに安定します。',
    '前向き力':'今日の一歩を少し具体的にすると、動き出しやすくなります。',
    'やり切り力':'決めた一歩を小さくすると、最後までやり切りやすくなります。' };
  return '今週は'+top+'が伸びています。'+(nudge[low]||nudge['継続力']);
}
function gbsLine(data, color){
  var w=280,h=72,pad=9; var min=Math.min.apply(null,data), max=Math.max.apply(null,data), rng=(max-min)||1;
  var pts=data.map(function(v,i){ var x=pad+i*((w-pad*2)/(data.length-1)); var y=h-pad-((v-min)/rng)*(h-pad*2); return [x,y]; });
  var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
  var area=line+' L'+pts[pts.length-1][0].toFixed(1)+' '+(h-pad)+' L'+pts[0][0].toFixed(1)+' '+(h-pad)+' Z';
  var last=pts[pts.length-1];
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:72px;overflow:visible" aria-hidden="true">'
    + '<path d="'+area+'" fill="'+color+'" opacity=".09"/>'
    + '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.6" fill="'+color+'"/></svg>';
}

// マイルストーン／動画の“構成”は受講者に見せない（内緒）。内部キューとして持つだけ。
function ensureQueue(){
  if(!Array.isArray(state.msQueue) || !state.msQueue.length){ state.msQueue = mockMilestones(); }
  if(typeof state.msProgress!=='number'){ state.msProgress = 28 + ((ME.streak||0)%7)*6; } // 初期から少し溜まった状態
}
function deliverVideo(m){
  var v={ id:'v_'+Date.now()+'_'+Math.floor(Math.random()*9999), reason:(m.title||'継続のごほうび'), title:m.cheerTitle, talent:'女子アナ 三上さん', badge:m.badge, type:'milestone', milestone:true, status:'unread', script:m.cheerScript };
  MY_VIDEOS.unshift(v); return v;
}
// 記録などのたびに“少しずつ”充当。満ちたら（内部で）動画が届く。受講者には条件は見えない。
function bumpVideoProgress(pts){
  ensureQueue();
  state.msProgress = (state.msProgress||0) + pts;
  var delivered=0;
  var guard=0;
  while(state.msProgress>=100 && guard<6){
    guard++;
    if(!state.msQueue.length) state.msQueue = mockMilestones();
    deliverVideo(state.msQueue.shift());
    state.msProgress -= 100; delivered++;
  }
  saveData();
  return delivered;
}
// 受講者向け：条件は出さず、細いバーがピンクで満ちていくだけ

  else if(FOLLOW_SORT==='noinput') followers.sort(function(a,b){return noInputDays(b)-noInputDays(a);});
  else if(FOLLOW_SORT==='name') followers.sort(function(a,b){return a.name.localeCompare(b.name,'ja');});

function wrapCanvasText(x,text,cx,cy,maxW,lh){
  var chars=(text||'').split(''),line='',y=cy;
  for(var i=0;i<chars.length;i++){ var test=line+chars[i]; if(x.measureText(test).width>maxW && line){ x.fillText(line,cx,y); line=chars[i]; y+=lh; } else { line=test; } }
  x.fillText(line,cx,y); return y;
}

function suggestCoachFromReason(reason){
  var r=reason||''; var curId=(state.assignedCoach&&state.assignedCoach.id)||COACHES[0].id;
  var cands=COACHES.filter(function(c){return c.id!==curId;});
  function pick(cat){ return cands.filter(function(c){return c.category===cat;})[0]; }
  var why='', chosen;
  // 強度の方向を先に判定（「もっと厳しく」と「厳しすぎる」を取り違えない）
  var wantsStrict=/もっと厳|厳しく|追い込|喝|本気|ぬる|甘え|物足/.test(r);
  var wantsGentle=/優しく|穏やか|聞いてほし|厳しすぎ|怖|詰め|プレッシャ|きつ|寄り添/.test(r);
  if(wantsStrict){ chosen=pick('athlete'); why='「もっと厳しく背中を押してほしい」という声から、結果志向のファイター型を選びました。'; }
  else if(wantsGentle){ chosen=pick('announcer')||pick('model'); why='「もっと穏やかに向き合ってほしい」という声から、傾聴型のアナウンサーを選びました。'; }

function goSlide(i){
  var n=COACH_SLIDES.length; _slideIdx=(i+n)%n;

  tr.style.transform='translateX(-'+(_slideIdx*100)+'%)';

  [].forEach.call(dots,function(d,k){ d.classList.toggle('on', k===_slideIdx); });

function startCoachSlider(){
  clearInterval(_slideTimer); _slideIdx=0;
  _slideTimer=setInterval(function(){ if(!el('slidesTrack')){ clearInterval(_slideTimer); return; } goSlide(_slideIdx+1); }, 3000);
  // 手動スワイプ（モバイル）
  var tr=el('slidesTrack'); if(tr){ var sx=0;
    tr.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; },{passive:true});
    tr.addEventListener('touchend',function(e){ var dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>40){ goSlide(_slideIdx+(dx<0?1:-1)); clearInterval(_slideTimer); _slideTimer=setInterval(function(){ if(!el('slidesTrack')){clearInterval(_slideTimer);return;} goSlide(_slideIdx+1); },3000); } },{passive:true});
  }

  if(!SERVER){
    if(em.trim().toLowerCase()==='test' && pw==='test'){
      USER={ id:'u_demo', name:'デモ ユーザー', email:'test', role:'member', demo:true };
      el('modalRoot').innerHTML='';
      var rs=el('roleswitch'); if(rs) rs.style.display='flex';   // 全ロール切替を表示
      state.role='user'; state.view='today'; render(); showIntro();
    } else { showLogin('ID / PASS が違います（デモは test / test）'); }
    return;
  }
  var btn=el('loginBtn'); if(btn){ btn.disabled=true; btn.textContent='確認中…'; }
  try{
    var r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:em,password:pw})});
    var j=await r.json();
    if(!r.ok){ showLogin(j.error||'ログインに失敗しました'); return; }
    USER=j.user; await afterLogin();
  }catch(err){ showLogin('通信エラー：'+err.message); }
}
function roleOf(u){ return u.role==='member'?'user':u.role; }
async function afterLogin(){
  el('modalRoot').innerHTML='';
  state.role=roleOf(USER); state.view=DEFAULT_VIEW[state.role];
  // デモ段階（test/test）はロール切替を残し、全ロールを閲覧できるようにする
  var rs=el('roleswitch'); if(rs) rs.style.display=USER.demo?'flex':'none';
  var cb=el('cfgBtn'); if(cb) cb.style.display='none';          // キーはサーバー側
  await serverLoad();
  // 受講者は100問パーソナリティ診断に答えるまでマイページに入れない（render()のゲートが担保）
  if(USER.role==='member' && !state.onboarding && !USER.demo){ state.view='onboarding'; }
  render();
  if(USER.demo){ showIntro(); } // デモアカウントは入口ガイドを表示
}

// 100問の診断結果（上位の軸）から営業タイプ（personality）を確定し、相性診断・コーチ選定に反映
var AXIS_SALESTYPE={ compete:'反骨成長型クローザー', challenge:'スピード行動型', selfdrive:'自走・裁量型', reward:'目標達成ドリブン型', approval:'承認モチベート型', relation:'関係構築型', empathy:'共感・傾聴型', growth:'成長志向型', purpose:'意義ドリブン型', stability:'継続・安定型' };
var AXIS_JA_S={compete:'勝ち負け',approval:'承認',growth:'成長',reward:'報酬・地位',relation:'チーム',purpose:'意義',stability:'継続',empathy:'対話・共感',challenge:'挑戦',selfdrive:'自分軸'};
function setPersonalityFromAxes(top){
  var P=(typeof mockPersonality==='function')?mockPersonality():{};
  P.salesType=AXIS_SALESTYPE[top[0]]||P.salesType||'バランス型';
  P.growthType='急成長型';
  P.strengths=(top||[]).slice(0,3).map(function(a){return AXIS_JA_S[a]||a;}).concat(P.strengths||[]).slice(0,4);
  P.diagnosedBy100=true;
  state.personality=P;
}
/* ① オンボーディング送信 → ペルソナ判定 → 女子アナ自動アサイン */
async function submitOnboarding(){
  var ax=onbAxisScores(); var ans=onbAnswered();
  if(ans<10){ toast('もう少し回答してください（10問以上）'); return; }
  var btn=el('onbSubmit'); if(btn){ btn.disabled=true; btn.textContent='AIがあなたに合うコーチを選定中…'; }
  if(SERVER && USER){
    try{ var r=await fetch('/api/onboarding',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({axisScores:ax,answeredCount:ans})}); var j=await r.json();
      if(r.ok){ state.onboarding={persona:j.persona,topAxes:j.topAxes,answeredCount:ans}; state.assignedCoach=j.coach; setPersonalityFromAxes(j.topAxes||Object.keys(ax).sort(function(a,b){return ax[b]-ax[a];})); saveData(); state.view='onboardingResult'; render(); return; } }
    catch(e){}
    toast('保存に失敗しました'); if(btn){ btn.disabled=false; btn.textContent='診断を完了する'; }
  } else {
    // タスク1: 営業タイプ × コーチのキャラでAIマッチング（スタンドアロン）
    var AFF={ c2:['compete','challenge','selfdrive'], c1:['empathy','relation','approval'], c3:['approval','reward','selfdrive'], c4:['growth','purpose','stability'] };
    var best=COACHES[0], bs=-1, bestScore=70;
    COACHES.forEach(function(c){ var s=0; (AFF[c.id]||[]).forEach(function(a){ s+=(ax[a]||0); }); if(s>bs){ bs=s; best=c; bestScore=Math.min(98,72+Math.round(s/20)); } });
    var top=Object.keys(ax).sort(function(a,b){return ax[b]-ax[a];}).slice(0,3);
    var ja={compete:'勝ち負け',approval:'承認',growth:'成長',reward:'報酬・地位',relation:'チーム',purpose:'意義',stability:'継続',empathy:'対話・共感',challenge:'挑戦',selfdrive:'自分軸'};
    state.onboarding={persona:top.map(function(a){return ja[a]||a;}).join('・')+'タイプ',topAxes:top,answeredCount:ans,matchScore:bestScore};
    state.assignedCoach={id:best.id,name:best.name,emoji:best.emoji,title:best.title,reason:best.strength+'点が好相性'};
    setPersonalityFromAxes(top); saveData();
    state.view='onboardingResult'; render();
  }
}

/* ---------- 起動：サーバーモード判定 ---------- */
(async function boot(){
  try{
    var r=await fetch('/api/me');
    if(r.status===200){ SERVER=true; var j=await r.json(); USER=j.user; AI_ENABLED=!!j.aiEnabled; await afterLogin(); return; }
    if(r.status===401){ SERVER=true; AI_ENABLED=false; render(); showLogin(); return; }
  }catch(e){ /* ファイル直開き等 → スタンドアロン */ }
  // スタンドアロン（ブラウザキー）モード：入口はログイン画面（ID/PASS）
  loadData(); renderCfgState();
  var rs=el('roleswitch'); if(rs) rs.style.display='none'; // ログイン前はロール切替を隠す
  render(); showLogin();
})();
</script>
